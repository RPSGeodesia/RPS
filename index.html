  window.addEventListener('DOMContentLoaded', () => {
    try {
      const local = JSON.parse(localStorage.getItem('rps_clientes_local') || '[]');
      if(local.length){
        window.clientes = [...(window.clientes || []), ...local]
          .filter((c,i,a)=>c && c.name && a.findIndex(x=>x.name===c.name)===i)
          .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
        if(typeof updateUI === 'function') updateUI();
      }
    } catch(e){}
    if(typeof renderPreview === 'function') renderPreview();
    if(typeof fitPreviewZoom === 'function') setTimeout(fitPreviewZoom, 120);
  });

</script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, deleteDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
      authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
      projectId: "registro-de-gastos-a21e8",
      storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
      messagingSenderId: "947355933583",
      appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.fb = { db, doc, collection, addDoc, deleteDoc, setDoc, runTransaction };

    onSnapshot(doc(db, "config", "rps_cotizador_v1"), (d) => {
      window.nextFolio = d.exists() ? Number(d.data().lastFolio || 1000) : 1000;
      if (window.nextFolio < 1000) window.nextFolio = 1000;
      renderPreview();
    });

    onSnapshot(collection(db, "rps_clientes"), (s) => {
      window.clientes = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.name || '').localeCompare(b.name || ''));
      updateClientsUI();
      renderPreview();
    });

    onSnapshot(collection(db, "rps_cotizaciones"), (s) => {
      window.historial = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => Number(b.folio || 0) - Number(a.folio || 0));
      renderHistory();
    });
  </script>

/* ============================================================
   RPS ERP — Topografía Patagonia UI
   Paleta inspirada en montaña, terreno, cartografía y geodesia.

:root{
  --rps-deep:#23364A;
  --rps-deep-2:#182536;
  --rps-graphite:#2B2B2B;
  --rps-rock:#55606B;

  --rps-sand:#D8CCB5;
  --rps-gold:#B89B5E;
  --rps-snow:#F7F7F2;
  --rps-muted:#BFC6CD;
  --rps-paper:#F4F0E6;
}

body{
  background:
    radial-gradient(circle at 12% 0%, rgba(216,204,181,.16) 0, rgba(216,204,181,0) 28%),
    radial-gradient(circle at 90% 12%, rgba(79,113,148,.25) 0, rgba(79,113,148,0) 32%),

  color:var(--rps-snow) !important;
}

  function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
  function money(n){ return '$ ' + Number(n || 0).toLocaleString('es-CL'); }
  function uf(n){ return 'UF ' + Number(n || 0).toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function amount(n, currency){ return currency === 'UF' ? uf(n) : money(n); }
  function amountEquivalent(n, currency, ufValue){ return (currency === 'UF' && Number(ufValue || 0) > 0) ? money(Number(n || 0) * Number(ufValue || 0)) : ''; }
  
  function quoteCode(q){
    const folioBase = (q && q.folio) ? q.folio : (window.nextFolio || 1000);
    return (q && q.ref) ? q.ref : ('AER-' + folioBase);
  }

  function fmtDate(d){ return d ? new Date(d+'T12:00:00').toLocaleDateString('es-CL') : '--/--/----'; }
  function handleCurrencyChange(){

    const priceInput = document.getElementById('i-price');

    renderPreview();

  function loadLogoPDF(){
    return new Promise(resolve=>{
      const img = new Image();
      img.onload = () => {
        try{
          const c = document.createElement('canvas');
          c.width = img.naturalWidth || img.width;
          c.height = img.naturalHeight || img.height;
          c.getContext('2d').drawImage(img,0,0);
          resolve({data:c.toDataURL('image/png'),w:c.width,h:c.height});
        }catch(e){ resolve({data:RPS_LOGO_DATA,w:img.width||300,h:img.height||160}); }
      };
      img.onerror = () => resolve(null);
      img.src = RPS_LOGO_DATA;
    });
  }

async function generateAndSharePDF(historyId=null, clientName=null, mode='save'){

    if(!JsPDF) return alert('No se cargó jsPDF.');

    let q = historyId ? (window.historial || []).find(x => x.id === historyId) : currentQuote();
    if(!q) return alert('No se encontró la cotización.');

    q.currency = q.currency || 'CLP';
    q.ufValue = Number(q.ufValue || 0);

    const c = (window.clientes || []).find(x => x.name === q.client) || { name: q.client };
    const quoteItems = normalizeItems((q.items || []).length ? q.items : [defaultItem()]);

    q.neto = quoteItems.reduce((s,i) => s + Number(i.total || 0), 0);
    q.iva = Math.round(q.neto * 0.19);
    q.total = q.neto + q.iva;

    const pdf = new JsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const logo = await loadLogoPDF();

    const W=210,H=297,MT=15,MB=15,ML=12,MR=12,CW=W-ML-MR; const M=ML;

    const GRAFITO_2 = [30, 41, 59];
    const AZUL_OSCURO = [20, 52, 93];
    const AZUL_SUAVE = [239, 246, 255];
    const GRIS = [100, 116, 139];
    const GRIS_SUAVE = [248, 250, 252];
    const LINEA = [203, 213, 225];
    const BLANCO = [255,255,255];
    let y=MT;

    function clean(v){ return String(v ?? '').replace(/\r/g,'').replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim(); }
    function cleanInline(v){ return String(v ?? '').replace(/\s+/g,' ').trim(); }
    function displayAmount(n){ return amount(n, q.currency); }
    function displayEq(n){ return amountEquivalent(n, q.currency, q.ufValue); }
    function split(v,w){ return pdf.splitTextToSize(clean(v), w); }
    function put(v,x,yy,opt={}){ Array.isArray(v) ? pdf.text(v, x, yy, opt) : pdf.text(String(v ?? ''), x, yy, opt); }
    function setFont(size, style='normal', color=GRAFITO){ pdf.setFont('helvetica', style); pdf.setFontSize(size); pdf.setTextColor(...color); }
    function stroke(color=LINEA, width=.22){ pdf.setDrawColor(...color); pdf.setLineWidth(width); }
    function fill(color){ pdf.setFillColor(...color); }

    function footer(){
      stroke(AZUL_OSCURO,.45); pdf.line(M, H-MB+5, W-M, H-MB+5);

    }
    function titleBar(title, x, yy, w, color=AZUL_OSCURO){
      fill(color); pdf.roundedRect(x, yy, w, 6.8, 1.2, 1.2, 'F');
      setFont(6.35,'bold',BLANCO); put(title.toUpperCase(), x+2.5, yy+4.65);

    function header(){

      setFont(15.5,'bold',GRAFITO); put(`N° ${quoteCode(q)}`, W-M, y+20, {align:'right'}); setFont(7.1,'normal',GRIS); put(`Fecha: ${fmtDate(q.date)}`, W-M, y+25, {align:'right'});

    function infoBox(){

    function descriptionBlock(){

    }

    function signature(){
      setFont(6.9,'normal',GRAFITO); put('Atentamente,',W/2,y,{align:'center'}); y+=11; stroke(GRAFITO,.3); pdf.line(W/2-28,y,W/2+28,y); y+=4.2;
      setFont(7.5,'bold',GRAFITO); put('ROBIN PINTO SERRANO',W/2,y,{align:'center'}); y+=3.8; setFont(6.4,'normal',GRIS); put(`Ingeniero Industrial / Topógrafo · ${COMPANY.name}`,W/2,y,{align:'center'});
    }

    header(); infoBox(); descriptionBlock(); quoteItems.forEach(serviceProposal); closureBand(); signature(); footer();
    const filename = `COT_${quoteCode(q)}.pdf`;
    if(mode === 'share' && navigator.share){ const blob=pdf.output('blob'); const file=new File([blob], filename, {type:'application/pdf'}); await navigator.share({files:[file], title:filename}); }
    else pdf.save(filename);
  }

  
  function updateUI(){
    const sel = document.getElementById('q-client');
    if(sel){
      const current = sel.value;
      sel.innerHTML = '<option value="">Seleccionar cliente</option><option value="NEW">➕ Nuevo cliente</option>';
      const localClients = JSON.parse(localStorage.getItem('rps_clientes_local') || '[]');
      const mergedClients = [...(window.clientes || []), ...localClients].filter((c,i,a)=>c && c.name && a.findIndex(x=>x.name===c.name)===i).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      window.clientes = mergedClients;
      mergedClients.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.name || '';
        opt.textContent = c.name || '';
        sel.appendChild(opt);
      });
      if(current) sel.value = current;
    }

    const list = document.getElementById('clients-list');
    if(list){
      list.innerHTML = (window.clientes || []).map(c => `
        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700 flex justify-between items-center gap-3">
          <div class="min-w-0">
            <b class="block text-white truncate">${esc(c.name || '')}</b>
            <small class="block text-slate-400 truncate">${esc(c.rut || '')} · ${esc(c.phone || c.email || '')}</small>
          </div>
          <button onclick="fb.deleteDoc(fb.doc(fb.db,'rps_clientes','${c.id}'))" class="icon-btn text-red-400">🗑️</button>
        </div>
      `).join('');
    }
  }

  function updateClientsUI(){ updateUI(); }

  function checkNewClient(el){
    if(el && el.value === 'NEW'){
      navTo('clients');
      el.value = '';
      return;
    }
    if(typeof renderPreview === 'function') renderPreview();
  }

  async function saveClient(){
    const getVal = (id) => {
      const el = document.getElementById(id);
      return el ? String(el.value || '').trim() : '';
    };

    const data = {
      id: 'local_' + Date.now(),
      name: getVal('c-name').toUpperCase(),
      rut: getVal('c-rut'),
      phone: getVal('c-phone'),
      email: getVal('c-email'),
      address: getVal('c-address')
    };

    if(!data.name){
      alert('Ingresa el nombre del cliente.');
      return;
    }

    try{
      const local = JSON.parse(localStorage.getItem('rps_clientes_local') || '[]');
      const filtered = local.filter(c => c.name !== data.name);
      filtered.push(data);
      localStorage.setItem('rps_clientes_local', JSON.stringify(filtered));

      window.clientes = [...(window.clientes || []).filter(c => c.name !== data.name), data]
        .sort((a,b) => (a.name || '').localeCompare(b.name || ''));

      if(typeof updateUI === 'function') updateUI();
      if(typeof updateClientsUI === 'function') updateClientsUI();

      if(window.fb && fb.db){
        try{
          await fb.addDoc(fb.collection(fb.db, 'rps_clientes'), data);
        }catch(fbErr){
          console.warn('Cliente guardado localmente; Firebase no respondió:', fbErr);
        }
      }

      ['c-name','c-rut','c-phone','c-email','c-address'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.value = '';
      });

      navTo('edit');

      setTimeout(() => {
        const sel = document.getElementById('q-client');
        if(sel){
          const exists = Array.from(sel.options).some(o => o.value === data.name);
          if(!exists){
            const opt = document.createElement('option');
            opt.value = data.name;
            opt.textContent = data.name;
            sel.appendChild(opt);
          }
          sel.value = data.name;
        }
        if(typeof renderPreview === 'function') renderPreview();
      }, 100);

    }catch(err){
      console.error(err);
      alert('No se pudo guardar el cliente: ' + (err.message || err));
    }
  }

  window.saveClient = saveClient;
  window.checkNewClient = checkNewClient;
  window.renderPreview = renderPreview;

async function saveAndSend(){
    const q = currentQuote();
    q.items = normalizeItems(items);
    q.neto = q.items.reduce((s,i)=>s+Number(i.total||0),0);
    q.iva = Math.round(q.neto * 0.19);
    q.total = q.neto + q.iva;

    if(!q.client){
      alert('Falta seleccionar o crear cliente.');
      return;
    }
    if(!q.items.length){
      alert('Falta agregar ítems.');
      return;
    }

    let f = editingId ? Number(window.currentFolio || q.folio || 1000) : Number(window.nextFolio || 1000);
    if(f < 1000) f = 1000;

    try{
      if(!editingId){
        await fb.runTransaction(fb.db, async(t)=>{
          const ref = fb.doc(fb.db,'config','rps_cotizador_v1');
          const snap = await t.get(ref);
          const last = snap.exists() ? Number(snap.data().lastFolio || 1000) : 1000;
          f = Math.max(1000, last);
          if(snap.exists()){
            t.update(ref,{lastFolio:f+1});
          }else{
            t.set(ref,{lastFolio:f+1});
          }
        });
      }

      const refCode = q.ref && q.ref.trim() ? q.ref.trim() : ('AER-' + f);
      const data = {...q, folio:f, ref:refCode, createdAt: new Date().toISOString()};

      if(editingId){
        await fb.setDoc(fb.doc(fb.db,'rps_cotizaciones',editingId),data);
      }else{
        await fb.addDoc(fb.collection(fb.db,'rps_cotizaciones'),data);
      }

      await generateAndSharePDF(null, null, 'save');

      items = [defaultItem()];
      editingId = null;
      window.currentFolio = null;

      const set = (id, value) => {
        const el = document.getElementById(id);
        if(el) el.value = value;
      };

      set('q-ref','');
      set('i-name',DEFAULT_ITEM_TEXT);
      set('i-price','');
      set('i-qty','1');
      set('q-service-desc',DEFAULT_SERVICE_DESC);

      renderPreview();
      navTo('hist');

    }catch(err){
      console.error(err);
      alert('No se pudo guardar/enviar la cotización: ' + (err.message || err));
    }
  }

  
  window.saveAndSend = saveAndSend;
  window.generateAndSharePDF = generateAndSharePDF;

  // --- ZOOM INTERNO ESTABLE PARA PRELIMINAR EN CELULAR ---
  const previewZoom = { scale:1, minScale:1, maxScale:4, x:0, y:0, dragging:false, startX:0, startY:0, startDist:0, startScale:1, pinchX:0, pinchY:0, pinchStartX:0, pinchStartY:0 };
  function zDist(touches){ const dx=touches[0].clientX-touches[1].clientX; const dy=touches[0].clientY-touches[1].clientY; return Math.hypot(dx,dy); }
  function zCenter(touches){ return { x:(touches[0].clientX+touches[1].clientX)/2, y:(touches[0].clientY+touches[1].clientY)/2 }; }
  function applyPreviewZoom(){
    const wrap=document.getElementById('pdf-preview-wrapper');
    if(!wrap) return;
    wrap.style.transform=`translate3d(${previewZoom.x}px, ${previewZoom.y}px, 0) scale(${previewZoom.scale})`;
  }
  function fitPreviewZoom(){
    const box=document.getElementById('preliminar-container');
    const wrap=document.getElementById('pdf-preview-wrapper');
    const page=document.getElementById('pdf-canvas');
    if(!box || !wrap || !page) return;
    const bw=box.clientWidth, bh=box.clientHeight, pw=page.offsetWidth, ph=page.offsetHeight;
    if(!bw || !bh || !pw || !ph){ setTimeout(fitPreviewZoom,120); return; }
    const pad=12;
    const fit=Math.min((bw-pad*2)/pw, (bh-pad*2)/ph);
    const scale=Math.max(0.12, Math.min(1, fit));
    previewZoom.scale=scale;
    previewZoom.minScale=scale;
    previewZoom.maxScale=4;
    previewZoom.x=(bw - pw*scale)/2;
    previewZoom.y=Math.max(8, (bh - ph*scale)/2);
    applyPreviewZoom();
  }
  function setupPreviewZoom(){
    const box=document.getElementById('preliminar-container');
    if(!box || box.dataset.zoomReady==='1') return;
    box.dataset.zoomReady='1';
    box.addEventListener('touchstart', e=>{
      if(e.touches.length===1){ e.preventDefault(); previewZoom.dragging=true; previewZoom.startX=e.touches[0].clientX-previewZoom.x; previewZoom.startY=e.touches[0].clientY-previewZoom.y; }
      if(e.touches.length===2){ e.preventDefault(); previewZoom.dragging=false; previewZoom.startDist=zDist(e.touches); previewZoom.startScale=previewZoom.scale; const c=zCenter(e.touches); previewZoom.pinchX=c.x; previewZoom.pinchY=c.y; previewZoom.pinchStartX=previewZoom.x; previewZoom.pinchStartY=previewZoom.y; }
    }, {passive:false});
    box.addEventListener('touchmove', e=>{
      e.preventDefault();
      if(e.touches.length===1 && previewZoom.dragging){ previewZoom.x=e.touches[0].clientX-previewZoom.startX; previewZoom.y=e.touches[0].clientY-previewZoom.startY; applyPreviewZoom(); }
      if(e.touches.length===2 && previewZoom.startDist>0){
        const current=zDist(e.touches);
        const nextScale=Math.min(previewZoom.maxScale, Math.max(previewZoom.minScale, previewZoom.startScale*(current/previewZoom.startDist)));
        const ratio=nextScale/previewZoom.startScale;
        const c=zCenter(e.touches);
        previewZoom.scale=nextScale;
        previewZoom.x=c.x - (previewZoom.pinchX-previewZoom.pinchStartX)*ratio;
        previewZoom.y=c.y - (previewZoom.pinchY-previewZoom.pinchStartY)*ratio;
        applyPreviewZoom();
      }
    }, {passive:false});
    box.addEventListener('touchend', e=>{ if(e.touches.length===0){ previewZoom.dragging=false; previewZoom.startDist=0; } }, {passive:false});
    box.addEventListener('dblclick', e=>{ e.preventDefault(); if(previewZoom.scale <= previewZoom.minScale+0.03){ previewZoom.scale=Math.min(2,previewZoom.maxScale); previewZoom.x=20; previewZoom.y=20; applyPreviewZoom(); } else fitPreviewZoom(); });
  }

  window.addEventListener('resize', () => setTimeout(fitPreviewZoom, 150));

  window.addEventListener('load',()=>{ if(!document.getElementById('q-service-desc').value) document.getElementById('q-service-desc').value=DEFAULT_SERVICE_DESC; if(!document.getElementById('i-name').value) document.getElementById('i-name').value=DEFAULT_ITEM_TEXT; updateClientsUI(); handleCurrencyChange(); setupPreviewZoom(); renderPreview(); setTimeout(fitPreviewZoom,160); });
</script>
