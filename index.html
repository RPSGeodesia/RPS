<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>RPS Topografía & Geodesia | Cotizador</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg:#07111f;
      --panel:#111c2b;
      --panel2:#172437;
      --line:#2d3f55;
      --blue:#155e9f;
      --blue2:#0f172a;
      --cyan:#7dd3fc;
      --text:#f8fafc;
      --muted:#94a3b8;
      --paper:#ffffff;
      --ink:#0f172a;
    }

    * { box-sizing:border-box; }
    html, body { width:100%; max-width:100%; overflow-x:hidden; }
    body {
      margin:0;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(125,211,252,.16), transparent 34%),
        linear-gradient(145deg,#07111f,#091827 48%,#041018);
      color:var(--text);
    }

    .topnav {
      position:sticky; top:0; z-index:20;
      display:grid; grid-template-columns:1fr 1fr 1fr;
      background:rgba(5,10,18,.92);
      border-bottom:1px solid rgba(125,211,252,.22);
      backdrop-filter:blur(12px);
    }
    .topnav button {
      border:0; background:transparent; color:rgba(248,250,252,.48);
      font-weight:900; text-transform:uppercase; letter-spacing:.05em;
      padding:18px 10px; font-size:13px;
      border-bottom:3px solid transparent;
    }
    .topnav button.active { color:var(--cyan); border-color:var(--cyan); }

    .tab { display:none; padding:18px; }
    .tab.active { display:block; }

    .layout {
      width:100%;
      max-width:1420px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(340px,430px) minmax(0,1fr);
      gap:28px;
      align-items:start;
    }

    .card {
      background:linear-gradient(180deg,rgba(17,28,43,.97),rgba(10,21,34,.97));
      border:1px solid rgba(125,211,252,.18);
      border-radius:24px;
      padding:22px;
      box-shadow:0 24px 70px rgba(0,0,0,.25);
    }
    .stack > * + * { margin-top:16px; }

    .input {
      width:100%; min-width:0;
      background:#0a1524;
      border:1px solid rgba(148,163,184,.30);
      color:#fff;
      border-radius:16px;
      padding:15px 16px;
      font-size:16px;
      line-height:1.35;
      outline:none;
    }
    textarea.input { min-height:145px; resize:vertical; white-space:pre-wrap; }
    .input::placeholder { color:rgba(148,163,184,.75); }
    .input:focus {
      border-color:var(--cyan);
      box-shadow:0 0 0 4px rgba(125,211,252,.16);
    }

    .btn {
      width:100%; border:0; border-radius:18px; padding:17px 20px;
      font-weight:900; text-transform:uppercase; cursor:pointer;
      background:linear-gradient(135deg,#7dd3fc,#2563eb);
      color:#06111f;
      box-shadow:0 18px 44px rgba(37,99,235,.25);
    }
    .btn.green { background:linear-gradient(135deg,#34d399,#10b981); color:#041018; }
    .btn.small { padding:12px 14px; border-radius:14px; font-size:12px; }

    .item-row, .list-row {
      background:rgba(15,23,42,.72);
      border:1px solid rgba(125,211,252,.14);
      border-radius:16px;
      padding:14px;
    }

    #previewContainer {
      position: relative;
      width: 100%;
    }

    #previewBox {
      height:calc(100vh - 118px);
      min-height:620px;
      overflow:auto;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:18px;
      background:linear-gradient(180deg,rgba(17,28,43,.84),rgba(6,16,28,.84));
      border:1px solid rgba(125,211,252,.18);
      border-radius:26px;
      box-shadow:0 24px 80px rgba(0,0,0,.30);
    }

    #previewScaler {
      width:210mm;
      height:auto;
      transform-origin:top center;
      flex:0 0 auto;
    }

    #pdf-canvas {
      width:210mm;
      display:flex;
      flex-direction:column;
      gap:8mm;
    }

    .a4 {
      width:210mm;
      height:297mm;
      min-height:297mm;
      max-height:297mm;
      overflow:hidden;
      background:white;
      color:var(--ink);
      padding:15mm 12mm;
      box-shadow:0 18px 45px rgba(0,0,0,.38);
      display:flex;
      flex-direction:column;
      gap:4mm;
      font-family:Arial, sans-serif;
      flex:0 0 auto;
    }

    .pdf-header {
      display:grid;
      grid-template-columns:1fr 50mm;
      gap:8mm;
      align-items:start;
    }
    .brand {
      display:flex; align-items:flex-start; gap:7mm;
    }
    .brand img {
      width:28mm; max-height:17mm; object-fit:contain;
    }
    .brand h1 { margin:0; font-size:13pt; line-height:1.05; }
    .brand p { margin:1mm 0 0; font-size:7pt; color:#64748b; line-height:1.15; }

    .quoteBox { text-align:right; }
    .quoteTag {
      display:inline-block; background:#0f172a; color:white;
      padding:3mm 4mm; border-radius:4px; font-size:7pt; font-weight:900;
      text-transform:uppercase;
    }
    .quoteNum { margin-top:3mm; font-size:16pt; font-weight:900; }
    .quoteDate { font-size:7pt; color:#64748b; }

    .blueLine { border-top:.55mm solid #1f5f9f; }

    .grid2 {
      display:grid; grid-template-columns:78mm 1fr; gap:5mm;
    }
    .pdf-card {
      border:.25mm solid #d5dfea; border-radius:5px; overflow:hidden; background:white;
    }
    .bar {
      background:#0f172a; color:white; font-size:6.8pt; font-weight:900;
      text-transform:uppercase; padding:2.2mm 3mm;
    }
    .bar.blue { background:#1f5f9f; }
    .pdf-card-body { padding:3mm; font-size:7.5pt; line-height:1.25; }
    .pdf-card-body h3 { margin:0 0 2mm; font-size:8pt; }
    .pdf-card-body p { margin:0 0 1mm; }

    .desc p, .service-body p {
      font-size:9.2pt; line-height:1.22; margin:3mm 4mm;
      max-height:none; overflow:visible; white-space: pre-wrap;
    }

    .service-body { padding:4mm; }
    .service-body h4 {
      margin:0 0 1.8mm; color:#1f5f9f; font-size:7.5pt; text-transform:uppercase;
    }
    .deliverables {
      display:grid; grid-template-columns:1fr 1fr; gap:1mm 8mm;
      font-size:8.8pt; line-height:1.15;
    }

    .payment {
      display:grid; grid-template-columns:1fr 66mm; gap:5mm;
    }
    .paymentCols {
      display:grid; grid-template-columns:1fr 1fr; gap:5mm; padding:3mm;
    }
    .paymentCols h4 {
      margin:0 0 1.4mm; font-size:6.7pt; color:#1f5f9f; text-transform:uppercase;
    }
    .paymentCols p { margin:0 0 .8mm; font-size:7pt; line-height:1.14; }

    .economic {
      border:.3mm solid #bfd0df; border-radius:6px; background:#f8fbfd; overflow:hidden;
    }
    .economic .head {
      background:#0f172a; color:white; padding:2mm 3mm; font-size:6.8pt; font-weight:900; text-transform:uppercase;
    }
    .econRow {
      display:flex; justify-content:space-between; gap:4mm;
      padding:1.6mm 3.2mm 0; font-size:7.8pt; color:#64748b;
    }
    .econRow strong { color:#0f172a; }
    .economic hr { border:0; border-top:.25mm solid #d5dfea; margin:1.5mm 3.2mm 1mm; }
    .grand span { color:#0f172a; font-weight:900; text-transform:uppercase; }
    .grand strong { font-size:13.4pt; color:#1f5f9f; }

    .signature {
      margin-top:auto !important; text-align:center; font-size:6.5pt;
    }
    .sigLine { width:50mm; margin:4.5mm auto 1mm; border-top:.25mm solid #0f172a; }
    .footer {
      border-top:.3mm solid #1f5f9f; padding-top:1.5mm;
      text-align:center; color:#64748b; font-size:5.2pt;
    }

    .zoom-controls {
      position: absolute; top: 12px; right: 12px; z-index: 30;
      display: flex; gap: 6px; background: rgba(15,23,42,0.85);
      padding: 6px; border-radius: 12px; border: 1px solid rgba(125,211,252,0.3);
    }
    .zoom-controls button {
      background: #1e293b; color: #7dd3fc; font-weight: bold;
      padding: 4px 10px; border-radius: 8px; font-size: 13px;
    }
    .zoom-controls button:hover { background: #334155; }

    @media (max-width:1023px) {
      .layout { display:block; }
      #previewBox { margin-top:18px; height:72vh; min-height:520px; }
      .tab { padding:12px; }
      .card { padding:18px; border-radius:22px; }
    }
  
    .list-row button{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:10px;padding:7px 9px;font-weight:800;}
  </style>
</head>

<body>
  <nav class="topnav">
    <button id="tab-edit-btn" class="active" onclick="navTo('edit')">Cotizador técnico</button>
    <button id="tab-hist-btn" onclick="navTo('hist')">Historial</button>
    <button id="tab-clients-btn" onclick="navTo('clients')">Clientes</button>

  <section id="tab-edit" class="tab active">
    <div class="layout">
      <div class="stack">
        <div class="card stack">

          </div>
          <select id="q-currency" class="input" onchange="renderPreview()">
            <option value="CLP">Pesos chilenos (CLP)</option>
            <option value="UF">Unidad de Fomento (UF)</option>
          </select>
          <select id="q-client" class="input" onchange="handleClientSelect()">
            <option value="">Seleccionar cliente</option>
            <option value="NEW">➕ Nuevo cliente</option>
          </select>
          <input id="q-project" class="input" placeholder="Proyecto / referencia del servicio" oninput="renderPreview()">
          <input id="q-location" class="input" placeholder="Ubicación / comuna del proyecto" oninput="renderPreview()">
          <textarea id="q-desc" class="input" oninput="renderPreview()"></textarea>
        </div>

        <div class="card stack">
          <textarea id="i-name" class="input" placeholder="Detalle técnico del servicio"></textarea>
          <div class="grid grid-cols-[80px_1fr] gap-3">
            <input id="i-qty" type="number" class="input text-center" value="1">
            <input id="i-price" type="number" class="input" placeholder="Precio neto">
          </div>
          <button class="btn small" onclick="addItem()">Agregar / Actualizar ítem</button>
        </div>

        <div id="items-list" class="stack"></div>

        <div class="card stack">
          <div class="grid grid-cols-2 gap-3">

      <div id="previewContainer">

        <div id="previewBox">
          <div id="previewScaler">
            <div id="pdf-canvas"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="tab-hist" class="tab">
    <div class="max-w-3xl mx-auto stack">
      <input id="search-hist" class="input" placeholder="Buscar cotización..." oninput="renderHistory()">
      <div id="history-list" class="stack"></div>
    </div>
  </section>

  <section id="tab-clients" class="tab">
    <div class="max-w-xl mx-auto stack">
      <div class="card stack">
        <input id="c-id" type="hidden">
        <input id="c-name" class="input" placeholder="Nombre / Empresa">
        <input id="c-rut" class="input" placeholder="RUT">
        <input id="c-phone" class="input" placeholder="Teléfono / WhatsApp">
        <input id="c-email" class="input" placeholder="Email">
        <input id="c-address" class="input" placeholder="Dirección">
        <button class="btn" onclick="saveClient()">Guardar cliente</button>
        <button class="btn small" style="background:#334155;color:white" onclick="clearClientForm()">Cancelar edición</button>
      </div>
      <div id="clients-list" class="stack"></div>
    </div>
  </section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, setDoc, deleteDoc, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
      authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
      projectId: "registro-de-gastos-a21e8",
      storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
      messagingSenderId: "947355933583",
      appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
    };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.fb = { db, collection, addDoc, setDoc, deleteDoc, doc, runTransaction };

  window.clientes = [];
  window.historial = [];
  window.nextFolio = 1000;

  onSnapshot(doc(db, "config", "rps_cotizador_v1"), snap => {
    window.nextFolio = snap.exists() ? Math.max(1000, Number(snap.data().lastFolio || 1000)) : 1000;
  });

  onSnapshot(collection(db, "rps_clientes"), snap => {
    window.clientes = snap.docs.map(d => ({id:d.id, ...d.data()}));
    if(typeof updateClientsUI === 'function') updateClientsUI();
  });

  onSnapshot(collection(db, "rps_cotizaciones"), snap => {
    window.historial = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>Number(b.folio||0)-Number(a.folio||0));
    if(typeof renderHistory === 'function') renderHistory();
  });
</script>

<script>
  const RPS_LOGO_DATA = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

  const COMPANY = {
    name:'RPS TOPOGRAFÍA & GEODESIA',
    legalName:'ROBIN PINTO SERRANO SERVICIOS DE TOPOGRAFÍA Y GEODESIA E.I.R.L.',
    rut:'77.444.231-6',
    address:'Av. Jaime Guzmán 659 - A3, Isla de Maipo',
    comuna:'Isla de Maipo',
    email:'contacto@rpsgeodesia.com',
    phone:'949207665',
    bank:'Banco Estado',
    account:'Cta Vista Banco Estado N° 36772581224',
    holder:'ROBIN PINTO SERRANO SERVICIOS DE TOPOGRAFÍA Y GEODESIA E.I.R.L.'
  };

  const DEFAULT_SERVICE_DESC = `Junto con saludar, por medio de la presente se cotiza el servicio de levantamiento topográfico georreferenciado para terreno de aproximadamente 5.000 m², ubicado en sector por definir, considerando trabajos de terreno, procesamiento de información técnica y entrega de antecedentes conforme al alcance indicado.`;

  const DEFAULT_ITEM_TEXT = `Levantamiento topográfico georreferenciado de todos los elementos relevantes del terreno mediante sistema GNSS de alta precisión, considerando bordes de calzada, líneas de cierre, líneas de edificación, líneas prediales, postes, cámaras y demás elementos existentes en terreno.

Se considera además postproceso de datos crudos GNSS (GPS) para obtención de coordenadas UTM Datum SIRGAS (WGS84) Huso 19 Sur, vinculadas a punto de control SIRGAS-IGM.

Incluye planificación de vuelo dron, captura aerofotogramétrica and postproceso de información técnica.

Entregables:
• Plano topográfico
• Informe técnico
• Nube de puntos densa
• Ortomosaico`;

  let items = [defaultItem()];
  let editingId = null;
  let editingClientId = null;
  let editingItemIdx = null; 
  let currentZoomFactor = null; 

  function defaultItem(){ return {name:DEFAULT_ITEM_TEXT, qty:1, price:0, total:0, isDefault:true}; }
  function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function money(n){ return '$ ' + Math.round(Number(n||0)).toLocaleString('es-CL'); }
  function amount(n,currency='CLP'){ return currency==='UF' ? Number(n||0).toLocaleString('es-CL',{maximumFractionDigits:2})+' UF' : money(n); }
  function fmtDate(d){ if(!d) return ''; const [y,m,day]=String(d).split('-'); return `${day}-${m}-${y}`; }
  function quoteCode(q){ return q?.ref || ('AER-' + (q?.folio || window.nextFolio || 1000)); }

  function normalizeItems(arr){
    return (arr || []).map(it => {
      const qty = Number(it?.qty || 1);
      const price = Number(it?.price || 0);
      return {...it, qty, price, total: Math.round(price*qty*100)/100};
    });
  }

  function captureFormState() {
    return {
      editingId,
      currentFolio: window.currentFolio,
      items: JSON.parse(JSON.stringify(items)),
      date: document.getElementById('q-date').value,
      ref: document.getElementById('q-ref').value,
      currency: document.getElementById('q-currency').value,
      client: document.getElementById('q-client').value,
      project: document.getElementById('q-project').value,
      location: document.getElementById('q-location').value,
      desc: document.getElementById('q-desc').value,
      validity: document.getElementById('q-validity').value,
      delivery: document.getElementById('q-delivery').value,
      conditions: document.getElementById('q-conditions').value,
      notes: document.getElementById('q-notes').value
    };
  }

  function applyQuoteToForm(h, triggerRender = true) {
    editingId = h.id;
    window.currentFolio = Number(h.folio || 1000);
    items = normalizeItems((h.items && h.items.length) ? h.items : [defaultItem()]);
    document.getElementById('q-date').value = h.date || '';
    document.getElementById('q-ref').value = h.ref || ('AER-' + (h.folio || 1000));
    document.getElementById('q-currency').value = h.currency || 'CLP';
    document.getElementById('q-client').value = h.client || '';
    document.getElementById('q-project').value = h.project || '';
    document.getElementById('q-location').value = h.location || '';
    document.getElementById('q-desc').value = h.serviceDesc || DEFAULT_SERVICE_DESC;
    document.getElementById('q-validity').value = h.validity || '15 días';
    document.getElementById('q-delivery').value = h.delivery || 'Según coordinación';
    document.getElementById('q-conditions').value = h.conditions || '';
    document.getElementById('q-notes').value = h.notes || '';
    if (triggerRender) renderPreview();
  }

  function restoreFormState(state) {
    editingId = state.editingId;
    window.currentFolio = state.currentFolio;
    items = state.items;
    document.getElementById('q-date').value = state.date;
    document.getElementById('q-ref').value = state.ref;
    document.getElementById('q-currency').value = state.currency;
    document.getElementById('q-client').value = state.client;
    document.getElementById('q-project').value = state.project;
    document.getElementById('q-location').value = state.location;
    document.getElementById('q-desc').value = state.desc;
    document.getElementById('q-validity').value = state.validity;
    document.getElementById('q-delivery').value = state.delivery;
    document.getElementById('q-conditions').value = state.conditions;
    document.getElementById('q-notes').value = state.notes;
  }

  function currentQuote(){
    const normalized = normalizeItems(items);
    let neto = normalized.reduce((s,i)=>s+Number(i.total||0),0);
    
    const manualPriceInput = document.getElementById('i-price');
    if (manualPriceInput && manualPriceInput.value !== "" && normalized.length === 1 && normalized[0].isDefault) {
      const mQty = Number(document.getElementById('i-qty').value || 1);
      const mPrice = Number(manualPriceInput.value || 0);
      neto = mQty * mPrice;
    }

    const iva = Math.round(neto*.19);
    return {
      folio: editingId ? window.currentFolio : (window.nextFolio || 1000),
      date: document.getElementById('q-date').value,
      ref: document.getElementById('q-ref').value,
      currency: document.getElementById('q-currency').value,
      client: document.getElementById('q-client').value,
      project: document.getElementById('q-project').value,
      location: document.getElementById('q-location').value,
      serviceDesc: document.getElementById('q-desc').value || DEFAULT_SERVICE_DESC,
      validity: document.getElementById('q-validity').value,
      delivery: document.getElementById('q-delivery').value,
      conditions: document.getElementById('q-conditions').value,
      notes: document.getElementById('q-notes').value,
      items: normalized, neto, iva, total: neto+iva
    };
  }

  function selectedClient(){
    const name = document.getElementById('q-client').value;
    return (window.clientes || []).find(c=>c.name===name) || {name};
  }

  function parseService(txt){
    const raw = String(txt||'').trim();
    const parts = raw.split(/Entregables\s*:/i);
    const scope = (parts[0] || raw).trim();
    let deliverables = [];
    if(parts[1]) deliverables = parts[1].split(/\n|•|-/).map(x=>x.trim()).filter(Boolean);
    if(!deliverables.length) deliverables = ['Plano topográfico','Informe técnico','Nube de puntos densa','Ortomosaico'];
    return {scope, deliverables};
  }

  function renderPreview(){
    const q = currentQuote();
    const c = selectedClient();
    const canvas = document.getElementById('pdf-canvas');
    if(!canvas) return;

    const PAGE_LIMIT = 240; 
    const HEADER_UNITS = 10;

    function cleanText(v){ return String(v ?? '').replace(/\r/g,'').trim(); }

    function splitText(v, maxChars){
      const source = cleanText(v);
      if(!source) return [''];
      const out = [];
      const blocks = source.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean);
      const baseBlocks = blocks.length ? blocks : [source];

      baseBlocks.forEach(block=>{
        const lines = block.split(/\n/).map(x=>x.trim()).filter(Boolean);
        const parts = lines.length > 1 ? lines : [block];

        parts.forEach(part=>{
          if(part.length <= maxChars){ out.push(part); return; }
          const words = part.split(/\s+/);
          let acc = '';
          words.forEach(w=>{
            const next = (acc + ' ' + w).trim();
            if(next.length > maxChars){
              if(acc.trim()) out.push(acc.trim());
              acc = w;
            }else{ acc = next; }
          });
          if(acc.trim()) out.push(acc.trim());
        });
      });
      return out.length ? out : [''];
    }

    function units(text, base){ 
      const txtLen = cleanText(text).length;
      return base + Math.ceil((txtLen > 0 ? txtLen : 1) / 100); 
    }

    function headerHTML(){
      return `
        <header class="pdf-header">
          <div class="brand">
            <img src="${RPS_LOGO_DATA}">
            <div>
              <h1>${COMPANY.name}</h1>
              <p>Servicios topográficos y geodésicos</p>
              <p>${COMPANY.email} · Fono: ${COMPANY.phone}</p>
            </div>
          </div>
          <div class="quoteBox">
            <div class="quoteTag">Cotización técnica</div>
            <div class="quoteNum">N° ${esc(quoteCode(q))}</div>
            <div class="quoteDate">Fecha: ${fmtDate(q.date)}</div>
          </div>
        </header>
        <div class="blueLine"></div>`;
    }

    function footerHTML(){
      return `<footer class="footer rps-page-footer">${COMPANY.name} · ${COMPANY.address} · ${COMPANY.comuna} · ${COMPANY.email} · Fono: ${COMPANY.phone}</footer>`;
    }

    canvas.innerHTML = '';
    let pages = [];
    let page;

    function newPage(){
      if(page && !page.querySelector('.rps-page-footer')){ page.insertAdjacentHTML('beforeend', footerHTML()); }
      page = document.createElement('div');
      page.className = 'a4';
      page.dataset.units = String(HEADER_UNITS);
      page.innerHTML = headerHTML();
      pages.push(page);
      canvas.appendChild(page);
    }

    function currentUnits(){ return Number(page.dataset.units || HEADER_UNITS); }

    function addBlock(node, unitCost){
      if(!page) newPage();
      if(currentUnits() + unitCost > PAGE_LIMIT){ newPage(); }
      page.appendChild(node);
      page.dataset.units = String(currentUnits() + unitCost);
    }

    function makeSection(className, innerHTML){
      const el = document.createElement('section');
      el.className = className;
      el.innerHTML = innerHTML;
      return el;
    }

    newPage();

    addBlock(makeSection('grid2', `
      <div class="pdf-card">
        <div class="bar">En atención a</div>
        <div class="pdf-card-body">
          <h3>${esc((c.name||'---').toUpperCase())}</h3>
          <p>RUT: ${esc(c.rut||'—')}</p>
          <p>Dirección: ${esc(c.address||'—')}</p>
          <p>Contacto: ${esc(c.phone||c.email||'—')}</p>
        </div>
      </div>
      <div class="pdf-card">
        <div class="bar blue">Antecedentes del proyecto</div>
        <div class="pdf-card-body">
          <p><b>Proyecto:</b> ${esc(q.project||'Servicio técnico')}</p>
          <p><b>Ubicación:</b> ${esc(q.location||'Por definir')}</p>
          <p><b>Validez:</b> ${esc(q.validity||'15 días')}</p>
          <p><b>Entrega:</b> ${esc(q.delivery||'Según coordinación')}</p>
          <p><b>Moneda:</b> ${q.currency==='UF'?'UF':'Pesos chilenos (CLP)'}</p>
        </div>
      </div>`), 15);

    splitText(q.serviceDesc || DEFAULT_SERVICE_DESC, 340).forEach((txt, idx)=>{
      addBlock(makeSection('pdf-card desc', `
        <div class="bar blue">Descripción del servicio</div>
        <p>${esc(txt).replace(/\n/g,'<br>')}</p>`), units(txt, 8));
    });

    let quoteItems = q.items.length ? q.items : [defaultItem()];
    if (quoteItems.length === 1 && quoteItems[0].isDefault && document.getElementById('i-price').value !== "") {
      quoteItems[0].price = Number(document.getElementById('i-price').value || 0);
      quoteItems[0].total = quoteItems[0].price * Number(document.getElementById('i-qty').value || 1);
    }

    quoteItems.forEach((it, i)=>{
      const parsed = parseService(it.name);
      const title = `Servicio profesional`;

      splitText(parsed.scope, 360).forEach((txt, idx)=>{
        addBlock(makeSection('pdf-card', `
          <div class="bar">${esc(title)}</div>
          <div class="service-body">
            <h4>Alcance técnico</h4>
            <p>${esc(txt).replace(/\n/g,'<br>')}</p>
          </div>`), units(txt, 10));
      });

      addBlock(makeSection('pdf-card', `
        <div class="bar">${esc(title)} · entregables</div>
        <div class="service-body">
          <h4>Entregables</h4>
          <div class="deliverables">${parsed.deliverables.map(d=>`<span>• ${esc(d)}</span>`).join('')}</div>
        </div>`), 12);
    });

    addBlock(makeSection('payment', `
      <div class="pdf-card">
        <div class="bar blue">Condiciones y datos de pago</div>
        <div class="paymentCols">
          <div><h4>Condiciones comerciales</h4><p>${esc(q.conditions).replace(/\n/g,'<br>')}</p></div>
          <div><h4>Transferencia bancaria</h4><p><b>${COMPANY.holder}</b></p><p>RUT: ${COMPANY.rut}</p><p>${COMPANY.bank}</p><p>${COMPANY.account}</p><p>${COMPANY.email}</p></div>
        </div>
      </div>
      <div class="economic">
        <div class="head">Resumen económico</div>
        <div class="econRow"><span>Valor neto</span><strong>${amount(q.neto,q.currency)}</strong></div>
        <div class="econRow"><span>IVA 19%</span><strong>${amount(q.iva,q.currency)}</strong></div>
        <hr>
        <div class="econRow grand"><span>Total servicio</span><strong>${amount(q.total,q.currency)}</strong></div>
      </div>`), 20);

    addBlock(makeSection('signature', `
      <div>Atentamente,</div>
      <div class="sigLine"></div>
      <b>ROBIN PINTO SERRANO</b><br>
      <span>Ingeniero Industrial / Topógrafo · ${COMPANY.name}</span>`), 10);

    pages.forEach(p=>{
      if(!p.querySelector('.rps-page-footer')){ p.insertAdjacentHTML('beforeend', footerHTML()); }
    });

    renderItems();
    setTimeout(fitPreview,80);
  }

  function fitPreview(){
    if (currentZoomFactor !== null) {
      document.getElementById('previewScaler').style.transform = `scale(${currentZoomFactor})`;
      return;
    }
    const box = document.getElementById('previewBox');
    const scaler = document.getElementById('previewScaler');
    if(!box || !scaler) return;
    const pageW = scaler.offsetWidth || 794;
    const pageH = scaler.offsetHeight || 1123;
    const s = Math.min((box.clientWidth-36)/pageW, (box.clientHeight-36)/pageH, 1.15);
    scaler.style.transform = `scale(${Math.max(.4, s)})`;
  }

  /* Nuevas funciones para controlar el Zoom Manual en pantalla */
  function changeZoom(amount) {
    const scaler = document.getElementById('previewScaler');
    if (!scaler) return;
    if (currentZoomFactor === null) {
      const box = document.getElementById('previewBox');
      const pageW = scaler.offsetWidth || 794;
      const pageH = scaler.offsetHeight || 1123;
      currentZoomFactor = Math.min((box.clientWidth-36)/pageW, (box.clientHeight-36)/pageH, 1.15);
    }
    currentZoomFactor = Math.max(0.3, Math.min(2.5, currentZoomFactor + amount));
    scaler.style.transform = `scale(${currentZoomFactor})`;
  }

  function resetZoom() {
    currentZoomFactor = null;
    fitPreview();
  }

  function renderItems(){
    const box = document.getElementById('items-list');
    box.innerHTML = items.map((it,i)=>`<div class="item-row flex justify-between gap-3 items-center">
      <span class="truncate font-bold">${esc((it.name||'').split('\n')[0])}</span>
      <small class="text-cyan-300 font-bold">${amount(it.total,currentQuote().currency)}</small>
      <div class="flex gap-2">
         <button onclick="editItem(${i})">✏️</button>
         <button onclick="items.splice(${i},1); if(!items.length) items=[defaultItem()]; renderPreview();">✕</button>
      </div>
    </div>`).join('');
  }

  function addItem(){
    const name = document.getElementById('i-name').value.trim();
    const qty = Number(document.getElementById('i-qty').value||1);
    const price = Number(document.getElementById('i-price').value||0);
    if(!name) return alert('Ingresa el detalle técnico del servicio.');
    
    const newItem = {name, qty, price, total:Math.round(qty*price*100)/100, isDefault:false};
    
    if(editingItemIdx !== null && editingItemIdx >= 0) {
      items[editingItemIdx] = newItem;
      editingItemIdx = null; 
    } else {
      const onlyDefault = items.length===1 && items[0].isDefault;
      if(onlyDefault) items[0]=newItem; else items.push(newItem);
    }
    
    document.getElementById('i-name').value = DEFAULT_ITEM_TEXT;
    document.getElementById('i-qty').value = 1;
    document.getElementById('i-price').value = '';
    renderPreview();
  }

  function editItem(i){
    const it = items[i];
    document.getElementById('i-name').value = it.name;
    document.getElementById('i-qty').value = it.qty;
    document.getElementById('i-price').value = it.price;
    editingItemIdx = i; 
  }

  function navTo(tab){
    ['edit','hist','clients'].forEach(t=>{
      document.getElementById('tab-'+t).classList.toggle('active',t===tab);
      document.getElementById('tab-'+t+'-btn').classList.toggle('active',t===tab);
    });
    if(tab==='clients') updateClientsUI();
    if(tab==='hist') renderHistory();
    if(tab==='edit') setTimeout(fitPreview,80);
  }

  function handleClientSelect(){
    if(document.getElementById('q-client').value==='NEW') navTo('clients');
    renderPreview();
  }

  async function saveClient(){
    const id = document.getElementById('c-id').value || editingClientId;
    const data = {
      id: id || ('local_'+Date.now()),
      name:document.getElementById('c-name').value.trim().toUpperCase(),
      rut:document.getElementById('c-rut').value.trim(),
      phone:document.getElementById('c-phone').value.trim(),
      email:document.getElementById('c-email').value.trim(),
      address:document.getElementById('c-address').value.trim()
    };
    if(!data.name) return alert('Ingresa el nombre del cliente.');

    const local = JSON.parse(localStorage.getItem('rps_clientes_local')||'[]').filter(c=>c.id!==data.id && c.name!==data.name);
    local.push(data);
    localStorage.setItem('rps_clientes_local',JSON.stringify(local));
    window.clientes = [...(window.clientes||[]).filter(c=>c.id!==data.id && c.name!==data.name),data];

    try{
      if(window.fb?.db){
        if(id && !String(id).startsWith('local_')) await fb.setDoc(fb.doc(fb.db,'rps_clientes',id),data);
        else await fb.addDoc(fb.collection(fb.db,'rps_clientes'),data);
      }
    }catch(e){ console.warn(e); }

    clearClientForm();
    updateClientsUI();
    navTo('edit');
    document.getElementById('q-client').value=data.name;
    renderPreview();
  }

  function clearClientForm(){
    editingClientId = null;
    ['c-id','c-name','c-rut','c-phone','c-email','c-address'].forEach(id=>document.getElementById(id).value='');
  }

  function editClient(id){
    const c = (window.clientes||[]).find(x=>String(x.id)===String(id));
    if(!c) return;
    editingClientId = c.id;
    document.getElementById('c-id').value = c.id || '';
    document.getElementById('c-name').value = c.name || '';
    document.getElementById('c-rut').value = c.rut || '';
    document.getElementById('c-phone').value = c.phone || '';
    document.getElementById('c-email').value = c.email || '';
    document.getElementById('c-address').value = c.address || '';
    navTo('clients');
  }

  async function deleteClient(id){
    const c = (window.clientes||[]).find(x=>String(x.id)===String(id));
    if(!c) return;
    if(!confirm('¿Eliminar este cliente?')) return;

    const local = JSON.parse(localStorage.getItem('rps_clientes_local')||'[]').filter(x=>String(x.id)!==String(id) && x.name!==c.name);
    localStorage.setItem('rps_clientes_local',JSON.stringify(local));
    window.clientes = (window.clientes||[]).filter(x=>String(x.id)!==String(id) && x.name!==c.name);

    try{
      if(window.fb?.db && !String(id).startsWith('local_')) await fb.deleteDoc(fb.doc(fb.db,'rps_clientes',id));
    }catch(e){ console.warn(e); }

    updateClientsUI();
    renderPreview();
  }

  function updateClientsUI(){
    const local = JSON.parse(localStorage.getItem('rps_clientes_local')||'[]');
    const merged = [...(window.clientes||[]),...local].filter((c,i,a)=>c?.name && a.findIndex(x=>x.name===c.name)===i).sort((a,b)=>a.name.localeCompare(b.name));
    window.clientes = merged;
    const sel = document.getElementById('q-client');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Seleccionar cliente</option><option value="NEW">➕ Nuevo cliente</option>' + merged.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
    if(cur) sel.value=cur;
    document.getElementById('clients-list').innerHTML = merged.length ? merged.map(c=>`
      <div class="list-row">
        <div class="flex justify-between gap-3 items-start">
          <div class="min-w-0">
            <b>${esc(c.name)}</b><br>
            <small>${esc(c.rut||'')} · ${esc(c.phone||c.email||'')}</small><br>
            <small>${esc(c.address||'')}</small>
          </div>
          <div class="flex gap-2 shrink-0">
            <button title="Editar" onclick="editClient('${c.id}')">✏️</button>
            <button title="Eliminar" onclick="deleteClient('${c.id}')">🗑️</button>
          </div>
        </div>
      </div>`).join('') : '<div class="list-row text-slate-400">Sin clientes guardados.</div>';
  }

  function renderHistory(){
    const q = document.getElementById('search-hist').value.toLowerCase();
    const data = (window.historial||[]).filter(h=>`${h.ref||''} ${h.client||''} ${h.project||''}`.toLowerCase().includes(q));
    document.getElementById('history-list').innerHTML = data.length ? data.map(h=>`
      <div class="list-row">
        <div class="flex justify-between gap-3 items-start">
          <div class="min-w-0">
            <b>${esc(h.ref||('AER-'+h.folio))}</b><br>
            <small>${esc(h.client||'Sin cliente')} · ${amount(h.total,h.currency)}</small><br>
            <small>${esc(h.project||'Servicio técnico')}</small>
          </div>
          <div class="flex gap-2 shrink-0">
            <button title="Ver" onclick="viewQuote('${h.id}')">🔍</button>
            <button title="Editar" onclick="editQuote('${h.id}')">✏️</button>
            <button title="PDF" onclick="generateAndSharePDF('${h.id}')">PDF</button>
            <button title="Eliminar" onclick="deleteQuote('${h.id}')">🗑️</button>
          </div>
        </div>
      </div>`).join('') : '<div class="list-row text-slate-400">Sin cotizaciones guardadas.</div>';
  }

  function quoteById(id){ return (window.historial||[]).find(h=>h.id===id); }

  function editQuote(id){ applyQuoteToForm(quoteById(id)); navTo('edit'); }
  function viewQuote(id){ applyQuoteToForm(quoteById(id)); navTo('edit'); }

  async function deleteQuote(id){
    if(!confirm('¿Eliminar esta cotización del historial?')) return;
    try{
      if(window.fb?.db) await fb.deleteDoc(fb.doc(fb.db,'rps_cotizaciones',id));
      window.historial = (window.historial||[]).filter(h=>h.id!==id);
      renderHistory();
    }catch(e){ console.error(e); alert('No se pudo eliminar: ' + (e.message || e)); }
  }

  async function saveAndSend(){
    const q = currentQuote();
    if(!q.client) return alert('Falta seleccionar o crear cliente.');
    let f = editingId ? Number(window.currentFolio || q.folio || 1000) : (window.nextFolio || 1000);
    try{
      if(!editingId && window.fb?.runTransaction){
        await fb.runTransaction(fb.db,async(t)=>{
          const r=fb.doc(fb.db,'config','rps_cotizador_v1');
          const s=await t.get(r);
          f=s.exists()?Math.max(1000,Number(s.data().lastFolio||1000)):1000;
          s.exists()?t.update(r,{lastFolio:f+1}):t.set(r,{lastFolio:f+1});
        });
      }
      const data={...q, folio:f, ref:q.ref||('AER-'+f), createdAt:new Date().toISOString()};
      if(window.fb?.db){
        if(editingId) await fb.setDoc(fb.doc(fb.db,'rps_cotizaciones',editingId),data);
        else await fb.addDoc(fb.collection(fb.db,'rps_cotizaciones'),data);
      }
      await generateAndSharePDF();
    }catch(e){ console.error(e); alert('No se pudo guardar/enviar: '+(e.message||e)); }
  }

  document.getElementById('q-date').valueAsDate = new Date();
  document.getElementById('q-ref').value = 'AER-1000';
  document.getElementById('q-desc').value = DEFAULT_SERVICE_DESC;
  document.getElementById('i-name').value = DEFAULT_ITEM_TEXT;
  
  document.getElementById('i-price').addEventListener('input', renderPreview);
  document.getElementById('i-qty').addEventListener('input', renderPreview);
  
  window.addEventListener('resize',fitPreview);
</script>

<script>
async function generateAndSharePDF(historyId=null, quoteOverride=null){
  const JsPDF = window.jspdf?.jsPDF;
  if(!JsPDF) return alert('No se cargó jsPDF.');

  let originalState = null;

  if(quoteOverride){
    originalState = captureFormState();
    applyQuoteToForm(quoteOverride, false);
    renderPreview();
    await new Promise(r=>setTimeout(r,80));
  }else if(historyId){
    const h = quoteById(historyId);
    if(!h) return alert('No se encontró la cotización.');
    originalState = captureFormState();
    applyQuoteToForm(h, false);
    renderPreview();
    await new Promise(r=>setTimeout(r,80));
  }else{
    renderPreview();
    await new Promise(r=>setTimeout(r,50));
  }

  const q = quoteOverride || (historyId ? quoteById(historyId) : currentQuote());
  const c = selectedClient();

  const pdf = new JsPDF({orientation:'portrait', unit:'mm', format:'a4', compress:true});

  const W=210, H=297, ML=12, MR=12, MT=15, MB=15, CW=W-ML-MR;
  const G=[15,23,42], B=[31,95,159], S=[100,116,139], L=[213,223,234];
  let y=MT;

  function font(size, style='normal', color=G){
    pdf.setFont('helvetica', style);
    pdf.setFontSize(size);
    pdf.setTextColor(...color);
  }

  function lines(text, w){ return pdf.splitTextToSize(String(text ?? ''), w); }

  function foot(){
    pdf.setDrawColor(...B); pdf.setLineWidth(.3);
    pdf.line(ML,H-9,W-MR,H-9);
    font(5.4,'normal',S);
    pdf.text(`${COMPANY.name} · ${COMPANY.address} · ${COMPANY.comuna} · ${COMPANY.email} · Fono: ${COMPANY.phone}`, W/2, H-5, {align:'center', maxWidth:CW});
  }

  function head(){
    y=MT;
    try{
      if(typeof RPS_LOGO_DATA==='string' && RPS_LOGO_DATA.startsWith('data:image')){
        pdf.addImage(RPS_LOGO_DATA,'PNG',ML,y,38,22,undefined,'FAST');
      }
    }catch(e){}
    font(12,'bold',G); pdf.text(COMPANY.name,ML+45,y+7);
    font(7,'normal',S);
    pdf.text('Servicios topográficos y geodésicos',ML+45,y+12);
    pdf.text(`${COMPANY.email} · Fono: ${COMPANY.phone}`,ML+45,y+16);

    pdf.setFillColor(15,23,42);
    pdf.roundedRect(W-MR-48,y,48,11,1.5,1.5,'F');
    font(6.5,'bold',[255,255,255]);
    pdf.text('COTIZACIÓN TÉCNICA',W-MR-24,y+7,{align:'center'});
    font(15,'bold',G); pdf.text(`N° ${quoteCode(q)}`,W-MR,y+23,{align:'right'});
    font(7,'normal',S); pdf.text(`Fecha: ${fmtDate(q.date)}`,W-MR,y+28,{align:'right'});
    y+=36; pdf.setDrawColor(...B); pdf.setLineWidth(.7); pdf.line(ML,y,W-MR,y); y+=6;
  }

  function page(){ foot(); pdf.addPage(); head(); }
  function need(h){ if(y+h > H-MB-8) page(); }

  function title(t, color=B){
    need(12);
    pdf.setFillColor(...color);
    pdf.roundedRect(ML,y,CW,7,1.2,1.2,'F');
    font(6.8,'bold',[255,255,255]);
    pdf.text(String(t).toUpperCase(),ML+3,y+4.8);
    y+=9;
  }

  function para(text, size=8.6, lh=4.0){
    const arr=lines(text,CW-8);
    for(const ln of arr){
      need(lh+2);
      font(size='normal',G);
      pdf.text(ln,ML+4,y);
      y+=lh;
    }
    y+=3;
  }

  function info(){
    need(40);
    const h=34, leftW=78, gap=5, rx=ML+leftW+gap, rw=CW-leftW-gap;
    pdf.setDrawColor(...L); pdf.setFillColor(255,255,255);
    pdf.roundedRect(ML,y,leftW,h,1.5,1.5,'FD');
    pdf.roundedRect(rx,y,rw,h,1.5,1.5,'FD');
    pdf.setFillColor(15,23,42); pdf.roundedRect(ML,y,leftW,7,1.5,1.5,'F');
    pdf.setFillColor(...B); pdf.roundedRect(rx,y,rw,7,1.5,1.5,'F');
    font(6.6,'bold',[255,255,255]);
    pdf.text('EN ATENCIÓN A',ML+3,y+4.8);
    pdf.text('ANTECEDENTES DEL PROYECTO',rx+3,y+4.8);
    font(7.5,'bold',G); pdf.text(lines((c.name||'---').toUpperCase(),leftW-6),ML+3,y+13);
    font(6.8,'normal',S);
    pdf.text(`RUT: ${c.rut||'—'}`,ML+3,y+21);
    pdf.text(lines(`Dirección: ${c.address||'—'}`,leftW-6),ML+3,y+26);
    pdf.text(`Contacto: ${c.phone||c.email||'—'}`,ML+3,y+32);

    let yy=y+13;
    function row(label,val){
      font(6.6,'bold',S); pdf.text(label,rx+3,yy);
      font(6.8,'normal',G); pdf.text(lines(val||'—',rw-30),rx+27,yy);
      yy+=4.8;
    }
    row('Proyecto:',q.project||'Servicio técnico');
    row('Ubicación:',q.location||'Por definir');
    row('Validez:',q.validity||'15 días');
    row('Entrega:',q.delivery||'Según coordinación');
    row('Moneda:',q.currency==='UF'?'UF':'Pesos chilenos (CLP)');
    y+=h+6;
  }

  function serviceBlock(label,it){
    const p=parseService(it.name);
    title(label,[15,23,42]);
    font(7,'bold',B); need(6); pdf.text('ALCANCE TÉCNICO',ML+4,y); y+=5;
    para(p.scope,8.4,3.9);
    font(7,'bold',B); need(6); pdf.text('ENTREGABLES',ML+4,y); y+=5;
    font(8.1,'normal',G);
    for(const d of p.deliverables){
      need(5);
      pdf.text(`• ${d}`,ML+6,y);
      y+=4.2;
    }
    y+=3;
  }

  function payment(){
    need(48);
    const top=y,h=43,gap=6,totalW=68,infoW=CW-totalW-gap;
    pdf.setDrawColor(...L); pdf.setFillColor(255,255,255);
    pdf.roundedRect(ML,top,infoW,h,1.5,1.5,'FD');
    pdf.setFillColor(241,247,251); pdf.roundedRect(ML,top,infoW,7,1.5,1.5,'F');
    font(6.6,'bold',[15,23,42]); pdf.text('CONDICIONES Y DATOS DE PAGO',ML+4,top+5);
    const colW=(infoW-10)/2, x2=ML+6+colW+4;
    font(6.5,'bold',B); pdf.text('Condiciones comerciales',ML+4,top+14);
    font(6.4,'normal',G); pdf.text(lines(q.conditions||'',colW),ML+4,top+19);
    font(6.5,'bold',B); pdf.text('Transferencia bancaria',x2,top+14);
    font(6.2,'normal',S);
    pdf.text(lines(`${COMPANY.holder}\nRUT: ${COMPANY.rut}\n${COMPANY.bank}\n${COMPANY.account}\n${COMPANY.email}`,colW),x2,top+19);

    const tx=ML+infoW+gap;
    pdf.setDrawColor(191,208,223); pdf.setFillColor(248,250,252);
    pdf.roundedRect(tx,top,totalW,h,1.8,1.8,'FD');
    pdf.setFillColor(15,23,42); pdf.roundedRect(tx,top,totalW,8,1.8,1.8,'F');
    font(6.6,'bold',[255,255,255]); pdf.text('RESUMEN ECONÓMICO',tx+4,top+5.5);
    let yy=top+16;
    function r(label,val,total=false){
      font(total?8:7.2,total?'bold':'normal',total?B:S);
      pdf.text(label,tx+4,yy);
      font(total?10.5:7.6,total?'bold':'normal',total?B:G);
      pdf.text(amount(val,q.currency),tx+totalW-4,yy,{align:'right'});
      yy+=total?8:6;
    }
    r('Valor neto',q.neto); r('IVA 19%',q.iva);
    pdf.setDrawColor(...L); pdf.line(tx+4,yy-2,tx+totalW-4,yy-2);
    r('TOTAL SERVICIO',q.total,true);
    y=top+h+8;
  }

  function sign(){
    need(24);
    font(6.8,'normal',G); pdf.text('Atentamente,',W/2,y,{align:'center'}); y+=7;
    pdf.setDrawColor(...G); pdf.line(W/2-27,y,W/2+27,y); y+=4;
    font(7.2,'bold',G); pdf.text('ROBIN PINTO SERRANO',W/2,y,{align:'center'}); y+=3.5;
    font(6,'normal',S); pdf.text(`Ingeniero Industrial / Topógrafo · ${COMPANY.name}`,W/2,y,{align:'center'});
  }

  head();
  info();
  title('Descripción del servicio',B);
  para(q.serviceDesc||DEFAULT_SERVICE_DESC,8.6,3.9);

  const its=q.items&&q.items.length?q.items:[defaultItem()];
  its.forEach((it,i)=>serviceBlock(`Servicio profesional${its.length>1?' '+(i+1):''}`,it));

  payment();
  sign();
  foot();

  if(originalState){
    restoreFormState(originalState);
    renderPreview();
  }
}

window.onload = function() {
  updateClientsUI();
  renderPreview();
};
</script>
</body>
</html>
