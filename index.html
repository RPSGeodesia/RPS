<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>RPS Topografía & Geodesia | Cotizador</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg:#07111f;
      --panel:#111c2b;
      --panel2:#172437;
      --line:#2d3f55;
      --blue:#155e9f;
      --blue2:#0f172a;
      --cyan:#7dd3fc;
      --text:#f8fafc;
      --muted:#94a3b8;
      --paper:#ffffff;
      --ink:#0f172a;
    }

    * { box-sizing:border-box; }
    html, body { width:100%; max-width:100%; overflow-x:hidden; }
    body {
      margin:0;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(125,211,252,.16), transparent 34%),
        linear-gradient(145deg,#07111f,#091827 48%,#041018);
      color:var(--text);
    }

    .topnav {
      position:sticky; top:0; z-index:20;
      display:grid; grid-template-columns:1fr 1fr 1fr;
      background:rgba(5,10,18,.92);
      border-bottom:1px solid rgba(125,211,252,.22);
      backdrop-filter:blur(12px);
    }
    .topnav button {
      border:0; background:transparent; color:rgba(248,250,252,.48);
      font-weight:900; text-transform:uppercase; letter-spacing:.05em;
      padding:18px 10px; font-size:13px;
      border-bottom:3px solid transparent;
    }
    .topnav button.active { color:var(--cyan); border-color:var(--cyan); }

    .tab { display:none; padding:18px; }
    .tab.active { display:block; }

    .layout {
      width:100%;
      max-width:1420px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(340px,430px) minmax(0,1fr);
      gap:28px;
      align-items:start;
    }

    .card {
      background:linear-gradient(180deg,rgba(17,28,43,.97),rgba(10,21,34,.97));
      border:1px solid rgba(125,211,252,.18);
      border-radius:24px;
      padding:22px;
      box-shadow:0 24px 70px rgba(0,0,0,.25);
    }
    .stack > * + * { margin-top:16px; }

    .input {
      width:100%; min-width:0;
      background:#0a1524;
      border:1px solid rgba(148,163,184,.30);
      color:#fff;
      border-radius:16px;
      padding:15px 16px;
      font-size:16px;
      line-height:1.35;
      outline:none;
    }
    textarea.input { min-height:145px; resize:vertical; white-space:pre-wrap; }
    .input::placeholder { color:rgba(148,163,184,.75); }
    .input:focus {
      border-color:var(--cyan);
      box-shadow:0 0 0 4px rgba(125,211,252,.16);
    }

    .btn {
      width:100%; border:0; border-radius:18px; padding:17px 20px;
      font-weight:900; text-transform:uppercase; cursor:pointer;
      background:linear-gradient(135deg,#7dd3fc,#2563eb);
      color:#06111f;
      box-shadow:0 18px 44px rgba(37,99,235,.25);
    }
    .btn.green { background:linear-gradient(135deg,#34d399,#10b981); color:#041018; }
    .btn.small { padding:12px 14px; border-radius:14px; font-size:12px; }

    .item-row, .list-row {
      background:rgba(15,23,42,.72);
      border:1px solid rgba(125,211,252,.14);
      border-radius:16px;
      padding:14px;
    }

    #previewBox {
      height:calc(100vh - 118px);
      min-height:620px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:linear-gradient(180deg,rgba(17,28,43,.84),rgba(6,16,28,.84));
      border:1px solid rgba(125,211,252,.18);
      border-radius:26px;
      box-shadow:0 24px 80px rgba(0,0,0,.30);
    }

    #previewScaler {
      width:210mm;
      height:297mm;
      transform-origin:center center;
      flex:0 0 auto;
    }

    .a4 {
      width:210mm;
      height:297mm;
      overflow:hidden;
      background:white;
      color:var(--ink);
      padding:15mm 12mm;
      box-shadow:0 18px 45px rgba(0,0,0,.38);
      display:flex;
      flex-direction:column;
      gap:4mm;
      font-family:Arial, sans-serif;
    }

    .pdf-header {
      display:grid;
      grid-template-columns:1fr 50mm;
      gap:8mm;
      align-items:start;
    }
    .brand {
      display:flex; align-items:flex-start; gap:7mm;
    }
    .brand img {
      width:28mm; max-height:17mm; object-fit:contain;
    }
    .brand h1 { margin:0; font-size:13pt; line-height:1.05; }
    .brand p { margin:1mm 0 0; font-size:7pt; color:#64748b; line-height:1.15; }

    .quoteBox { text-align:right; }
    .quoteTag {
      display:inline-block; background:#0f172a; color:white;
      padding:3mm 4mm; border-radius:4px; font-size:7pt; font-weight:900;
      text-transform:uppercase;
    }
    .quoteNum { margin-top:3mm; font-size:16pt; font-weight:900; }
    .quoteDate { font-size:7pt; color:#64748b; }

    .blueLine { border-top:.55mm solid #1f5f9f; }

    .grid2 {
      display:grid; grid-template-columns:78mm 1fr; gap:5mm;
    }
    .pdf-card {
      border:.25mm solid #d5dfea; border-radius:5px; overflow:hidden; background:white;
    }
    .bar {
      background:#0f172a; color:white; font-size:6.8pt; font-weight:900;
      text-transform:uppercase; padding:2.2mm 3mm;
    }
    .bar.blue { background:#1f5f9f; }
    .pdf-card-body { padding:3mm; font-size:7.5pt; line-height:1.25; }
    .pdf-card-body h3 { margin:0 0 2mm; font-size:8pt; }
    .pdf-card-body p { margin:0 0 1mm; }

    .desc p {
      font-size:9.2pt; line-height:1.22; margin:3mm 4mm;
      max-height:none; overflow:visible;
    }

    .service-body { padding:4mm; }
    .service-body h4 {
      margin:0 0 1.8mm; color:#1f5f9f; font-size:7.5pt; text-transform:uppercase;
    }
    .service-body p {
      margin:0 0 3mm; font-size:8.8pt; line-height:1.18; max-height:none; overflow:visible;
    }
    .deliverables {
      display:grid; grid-template-columns:1fr 1fr; gap:1mm 8mm;
      font-size:8.8pt; line-height:1.15;
    }

    .payment {
      display:grid; grid-template-columns:1fr 66mm; gap:5mm;
    }
    .paymentCols {
      display:grid; grid-template-columns:1fr 1fr; gap:5mm; padding:3mm;
    }
    .paymentCols h4 {
      margin:0 0 1.4mm; font-size:6.7pt; color:#1f5f9f; text-transform:uppercase;
    }
    .paymentCols p { margin:0 0 .8mm; font-size:7pt; line-height:1.14; }

    .economic {
      border:.3mm solid #bfd0df; border-radius:6px; background:#f8fbfd; overflow:hidden;
    }
    .economic .head {
      background:#0f172a; color:white; padding:2mm 3mm; font-size:6.8pt; font-weight:900; text-transform:uppercase;
    }
    .econRow {
      display:flex; justify-content:space-between; gap:4mm;
      padding:1.6mm 3.2mm 0; font-size:7.8pt; color:#64748b;
    }
    .econRow strong { color:#0f172a; }
    .economic hr { border:0; border-top:.25mm solid #d5dfea; margin:1.5mm 3.2mm 1mm; }
    .grand span { color:#0f172a; font-weight:900; text-transform:uppercase; }
    .grand strong { font-size:13.4pt; color:#1f5f9f; }

    .signature {
      margin-top:auto; text-align:center; font-size:6.5pt;
    }
    .sigLine { width:50mm; margin:4.5mm auto 1mm; border-top:.25mm solid #0f172a; }
    .footer {
      border-top:.3mm solid #1f5f9f; padding-top:1.5mm;
      text-align:center; color:#64748b; font-size:5.2pt;
    }

    @media (max-width:1023px) {
      .layout { display:block; }
      #previewBox { margin-top:18px; height:72vh; min-height:520px; }
      .tab { padding:12px; }
      .card { padding:18px; border-radius:22px; }
    }
  
    .list-row button{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:10px;padding:7px 9px;font-weight:800;}
  </style>

<style id="rps-final-fixes">
  /* LOGO MÁS GRANDE */
  .brand{
    align-items:center !important;
    gap:10mm !important;
  }

  .brand img{
    width:42mm !important;
    max-height:28mm !important;
    height:auto !important;
    object-fit:contain !important;
  }

  .brand h1{
    font-size:12.8pt !important;
  }

  .brand p{
    font-size:6.8pt !important;
  }

  /* TEXTOS SIN CORTE */
  .desc p,
  .service-body p{
    max-height:none !important;
    overflow:visible !important;
  }

  .desc p{
    font-size:8.1pt !important;
    line-height:1.12 !important;
    margin:2.4mm 3.4mm !important;
  }

  .service-body{
    padding:3mm 3.4mm !important;
  }

  .service-body p{
    font-size:7.75pt !important;
    line-height:1.09 !important;
    margin:0 0 1.8mm !important;
  }

  .service-body h4{
    font-size:6.8pt !important;
    margin:0 0 1mm !important;
  }

  .deliverables{
    font-size:7.7pt !important;
    line-height:1.08 !important;
    gap:.7mm 7mm !important;
  }

  .bar{
    padding:1.8mm 3mm !important;
    font-size:6.2pt !important;
  }

  .a4{
    gap:3mm !important;
  }

  .grid2{
    gap:4.5mm !important;
  }

  .pdf-card-body{
    padding:2.6mm !important;
    font-size:6.8pt !important;
    line-height:1.12 !important;
  }

  .pdf-card-body p{
    margin:0 0 .65mm !important;
  }

  .payment{
    grid-template-columns:1fr 64mm !important;
    gap:4.5mm !important;
  }

  .paymentCols{
    padding:2.5mm !important;
    gap:4mm !important;
  }

  .paymentCols p{
    font-size:6.25pt !important;
    line-height:1.05 !important;
  }

  .paymentCols h4{
    font-size:6pt !important;
    margin-bottom:.9mm !important;
  }

  .econRow{
    font-size:7.3pt !important;
    padding:1.3mm 3mm 0 !important;
  }

  .grand strong{
    font-size:12.4pt !important;
  }

  /* PRELIMINAR CENTRADO Y COMPLETO */
  #previewBox{
    overflow:hidden !important;
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
  }

  #previewScaler{
    transform-origin:center center !important;
    flex:0 0 auto !important;
  }

  /* BOTONES DE LISTADOS */
  .list-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .list-actions button,
  .list-row button{
    background:#1e293b;
    color:#e2e8f0;
    border:1px solid #334155;
    border-radius:10px;
    padding:7px 9px;
    font-weight:800;
    cursor:pointer;
  }

  .list-actions button:hover,
  .list-row button:hover{
    filter:brightness(1.15);
  }
</style>

</head>

<body>
  <nav class="topnav">
    <button id="tab-edit-btn" class="active" onclick="navTo('edit')">Cotizador técnico</button>
    <button id="tab-hist-btn" onclick="navTo('hist')">Historial</button>
    <button id="tab-clients-btn" onclick="navTo('clients')">Clientes</button>
  </nav>

  <section id="tab-edit" class="tab active">
    <div class="layout">
      <div class="stack">
        <div class="card stack">
          <div class="grid grid-cols-2 gap-3">
            <input id="q-date" type="date" class="input" oninput="renderPreview()">
            <input id="q-ref" type="text" class="input" placeholder="AER-1000" oninput="renderPreview()">
          </div>
          <select id="q-currency" class="input" onchange="renderPreview()">
            <option value="CLP">Pesos chilenos (CLP)</option>
            <option value="UF">Unidad de Fomento (UF)</option>
          </select>
          <select id="q-client" class="input" onchange="handleClientSelect()">
            <option value="">Seleccionar cliente</option>
            <option value="NEW">➕ Nuevo cliente</option>
          </select>
          <input id="q-project" class="input" placeholder="Proyecto / referencia del servicio" oninput="renderPreview()">
          <input id="q-location" class="input" placeholder="Ubicación / comuna del proyecto" oninput="renderPreview()">
          <textarea id="q-desc" class="input" oninput="renderPreview()"></textarea>
        </div>

        <div class="card stack">
          <textarea id="i-name" class="input" placeholder="Detalle técnico del servicio"></textarea>
          <div class="grid grid-cols-[80px_1fr] gap-3">
            <input id="i-qty" type="number" class="input text-center" value="1">
            <input id="i-price" type="number" class="input" placeholder="Precio neto">
          </div>
          <button class="btn small" onclick="addItem()">Agregar ítem</button>
        </div>

        <div id="items-list" class="stack"></div>

        <div class="card stack">
          <div class="grid grid-cols-2 gap-3">
            <input id="q-validity" class="input" value="15 días" oninput="renderPreview()">
            <input id="q-delivery" class="input" value="Según coordinación" oninput="renderPreview()">
          </div>
          <textarea id="q-conditions" class="input" oninput="renderPreview()">50% de anticipo para iniciar los trabajos. 50% contra entrega de antecedentes finales.</textarea>
          <textarea id="q-notes" class="input" placeholder="Observaciones adicionales" oninput="renderPreview()"></textarea>
        </div>

        <button class="btn green" onclick="saveAndSend()">Guardar y enviar PDF</button>
      </div>

      <div id="previewBox">
        <div id="previewScaler">
          <div id="pdf-canvas"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="tab-hist" class="tab">
    <div class="max-w-3xl mx-auto stack">
      <input id="search-hist" class="input" placeholder="Buscar cotización..." oninput="renderHistory()">
      <div id="history-list" class="stack"></div>
    </div>
  </section>

  <section id="tab-clients" class="tab">
    <div class="max-w-xl mx-auto stack">
      <div class="card stack">
        <input id="c-id" type="hidden">
        <input id="c-name" class="input" placeholder="Nombre / Empresa">
        <input id="c-rut" class="input" placeholder="RUT">
        <input id="c-phone" class="input" placeholder="Teléfono / WhatsApp">
        <input id="c-email" class="input" placeholder="Email">
        <input id="c-address" class="input" placeholder="Dirección">
        <button class="btn" onclick="saveClient()">Guardar cliente</button>
        <button class="btn small" style="background:#334155;color:white" onclick="clearClientForm()">Cancelar edición</button>
      </div>
      <div id="clients-list" class="stack"></div>
    </div>
  </section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, setDoc, deleteDoc, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
      apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
      authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
      projectId: "registro-de-gastos-a21e8",
      storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
      messagingSenderId: "947355933583",
      appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
    };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.fb = { db, collection, addDoc, setDoc, deleteDoc, doc, runTransaction };

  window.clientes = [];
  window.historial = [];
  window.nextFolio = 1000;

  onSnapshot(doc(db, "config", "rps_cotizador_v1"), snap => {
    window.nextFolio = snap.exists() ? Math.max(1000, Number(snap.data().lastFolio || 1000)) : 1000;
    renderPreview();
  });

  onSnapshot(collection(db, "rps_clientes"), snap => {
    window.clientes = snap.docs.map(d => ({id:d.id, ...d.data()}));
    updateClientsUI();
    renderPreview();
  });

  onSnapshot(collection(db, "rps_cotizaciones"), snap => {
    window.historial = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>Number(b.folio||0)-Number(a.folio||0));
    renderHistory();
  });
</script>

  let items = [defaultItem()];

  function defaultItem(){ return {name:DEFAULT_ITEM_TEXT, qty:1, price:0, total:0, isDefault:true}; }
  function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function money(n){ return '$ ' + Math.round(Number(n||0)).toLocaleString('es-CL'); }
  function amount(n,currency='CLP'){ return currency==='UF' ? Number(n||0).toLocaleString('es-CL',{maximumFractionDigits:2})+' UF' : money(n); }
  function fmtDate(d){ if(!d) return ''; const [y,m,day]=String(d).split('-'); return `${day}-${m}-${y}`; }
  function quoteCode(q){ return q?.ref || ('AER-' + (q?.folio || window.nextFolio || 1000)); }

  function normalizeItems(arr){
    return (arr || []).map(it => {
      const qty = Number(it?.qty || 1);
      const price = Number(it?.price || 0);
      return {...it, qty, price, total: Math.round(price*qty*100)/100};
    });
  }

  function currentQuote(){
    const normalized = normalizeItems(items);
    const neto = normalized.reduce((s,i)=>s+Number(i.total||0),0);
    const iva = Math.round(neto*.19);
    return {
      folio: editingId ? window.currentFolio : (window.nextFolio || 1000),
      date: document.getElementById('q-date').value,
      ref: document.getElementById('q-ref').value,
      currency: document.getElementById('q-currency').value,
      client: document.getElementById('q-client').value,
      project: document.getElementById('q-project').value,
      location: document.getElementById('q-location').value,
      serviceDesc: document.getElementById('q-desc').value || DEFAULT_SERVICE_DESC,
      validity: document.getElementById('q-validity').value,
      delivery: document.getElementById('q-delivery').value,
      conditions: document.getElementById('q-conditions').value,
      notes: document.getElementById('q-notes').value,
      items: normalized, neto, iva, total: neto+iva
    };
  }

  function selectedClient(){
    const name = document.getElementById('q-client').value;
    return (window.clientes || []).find(c=>c.name===name) || {name};
  }

  function parseService(txt){
    const raw = String(txt||'').trim();
    const parts = raw.split(/Entregables\s*:/i);

    let deliverables = [];
    if(parts[1]) deliverables = parts[1].split(/\n|•|-/).map(x=>x.trim()).filter(Boolean);
    if(!deliverables.length) deliverables = ['Plano topográfico','Informe técnico','Nube de puntos densa','Ortomosaico'];
    return {scope, deliverables};
  }

      </header>

      <section class="grid2">

  function fitPreview(){
    const box = document.getElementById('previewBox');
    const scaler = document.getElementById('previewScaler');
    if(!box || !scaler) return;
    const pageW = scaler.offsetWidth || 794;
    const pageH = scaler.offsetHeight || 1123;
    const s = Math.min((box.clientWidth-36)/pageW, (box.clientHeight-36)/pageH, 1.15);
    scaler.style.transform = `scale(${Math.max(.1,s)})`;
  }

  function renderItems(){
    const box = document.getElementById('items-list');
    box.innerHTML = items.map((it,i)=>`<div class="item-row flex justify-between gap-3 items-center">
      <span class="truncate font-bold">${esc((it.name||'').split('\n')[0])}</span>
      <small class="text-cyan-300 font-bold">${amount(it.total,currentQuote().currency)}</small>
      <button onclick="editItem(${i})">✏️</button>
      <button onclick="items.splice(${i},1); if(!items.length) items=[defaultItem()]; renderPreview();">✕</button>
    </div>`).join('');
  }

  function addItem(){
    const name = document.getElementById('i-name').value.trim();
    const qty = Number(document.getElementById('i-qty').value||1);
    const price = Number(document.getElementById('i-price').value||0);
    if(!name) return alert('Ingresa el detalle técnico del servicio.');
    const newItem = {name, qty, price, total:Math.round(qty*price*100)/100};
    const onlyDefault = items.length===1 && items[0].isDefault && Number(items[0].total||0)===0;
    if(onlyDefault) items[0]=newItem; else items.push(newItem);
    document.getElementById('i-name').value = DEFAULT_ITEM_TEXT;
    document.getElementById('i-qty').value = 1;
    document.getElementById('i-price').value = '';
    renderPreview();
  }

  function editItem(i){
    const it = items[i];
    document.getElementById('i-name').value = it.name;
    document.getElementById('i-qty').value = it.qty;
    document.getElementById('i-price').value = it.price;
    items.splice(i,1);
    if(!items.length) items=[defaultItem()];
    renderPreview();
  }

  function navTo(tab){
    ['edit','hist','clients'].forEach(t=>{
      document.getElementById('tab-'+t).classList.toggle('active',t===tab);
      document.getElementById('tab-'+t+'-btn').classList.toggle('active',t===tab);
    });
    if(tab==='clients') updateClientsUI();
    if(tab==='hist') renderHistory();
    if(tab==='edit') setTimeout(fitPreview,80);
  }

  function handleClientSelect(){
    if(document.getElementById('q-client').value==='NEW') navTo('clients');
    renderPreview();
  }

  async function saveClient(){
    const id = document.getElementById('c-id').value || editingClientId;
    const data = {
      id: id || ('local_'+Date.now()),
      name:document.getElementById('c-name').value.trim().toUpperCase(),
      rut:document.getElementById('c-rut').value.trim(),
      phone:document.getElementById('c-phone').value.trim(),
      email:document.getElementById('c-email').value.trim(),
      address:document.getElementById('c-address').value.trim()
    };
    if(!data.name) return alert('Ingresa el nombre del cliente.');

    const local = JSON.parse(localStorage.getItem('rps_clientes_local')||'[]').filter(c=>c.id!==data.id && c.name!==data.name);
    local.push(data);
    localStorage.setItem('rps_clientes_local',JSON.stringify(local));

    window.clientes = [...(window.clientes||[]).filter(c=>c.id!==data.id && c.name!==data.name),data];

    try{
      if(window.fb?.db){
        if(id && !String(id).startsWith('local_')) await fb.setDoc(fb.doc(fb.db,'rps_clientes',id),data);
        else await fb.addDoc(fb.collection(fb.db,'rps_clientes'),data);
      }
    }catch(e){ console.warn(e); }

    clearClientForm();
    updateClientsUI();
    navTo('edit');
    document.getElementById('q-client').value=data.name;
    renderPreview();
  }

  function clearClientForm(){
    editingClientId = null;
    ['c-id','c-name','c-rut','c-phone','c-email','c-address'].forEach(id=>document.getElementById(id).value='');
  }

  function editClient(id){
    const c = (window.clientes||[]).find(x=>String(x.id)===String(id));
    if(!c) return;
    editingClientId = c.id;
    document.getElementById('c-id').value = c.id || '';
    document.getElementById('c-name').value = c.name || '';
    document.getElementById('c-rut').value = c.rut || '';
    document.getElementById('c-phone').value = c.phone || '';
    document.getElementById('c-email').value = c.email || '';
    document.getElementById('c-address').value = c.address || '';
    navTo('clients');
  }

  async function deleteClient(id){
    const c = (window.clientes||[]).find(x=>String(x.id)===String(id));
    if(!c) return;
    if(!confirm('¿Eliminar este cliente?')) return;

    const local = JSON.parse(localStorage.getItem('rps_clientes_local')||'[]').filter(x=>String(x.id)!==String(id) && x.name!==c.name);
    localStorage.setItem('rps_clientes_local',JSON.stringify(local));
    window.clientes = (window.clientes||[]).filter(x=>String(x.id)!==String(id) && x.name!==c.name);

    try{
      if(window.fb?.db && !String(id).startsWith('local_')) await fb.deleteDoc(fb.doc(fb.db,'rps_clientes',id));
    }catch(e){ console.warn(e); }

    updateClientsUI();
    renderPreview();
  }

  function updateClientsUI(){
    const local = JSON.parse(localStorage.getItem('rps_clientes_local')||'[]');
    const merged = [...(window.clientes||[]),...local].filter((c,i,a)=>c?.name && a.findIndex(x=>x.name===c.name)===i).sort((a,b)=>a.name.localeCompare(b.name));
    window.clientes = merged;
    const sel = document.getElementById('q-client');
    const cur = sel.value;
    sel.innerHTML = '<option value="">Seleccionar cliente</option><option value="NEW">➕ Nuevo cliente</option>' + merged.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
    if(cur) sel.value=cur;
    document.getElementById('clients-list').innerHTML = merged.length ? merged.map(c=>`
      <div class="list-row">
        <div class="flex justify-between gap-3 items-start">
          <div class="min-w-0">
            <b>${esc(c.name)}</b><br>
            <small>${esc(c.rut||'')} · ${esc(c.phone||c.email||'')}</small><br>
            <small>${esc(c.address||'')}</small>
          </div>
          <div class="flex gap-2 shrink-0">
            <button title="Editar" onclick="editClient('${c.id}')">✏️</button>
            <button title="Eliminar" onclick="deleteClient('${c.id}')">🗑️</button>
          </div>
        </div>
      </div>`).join('') : '<div class="list-row text-slate-400">Sin clientes guardados.</div>';
  }

  function renderHistory(){
    const q = document.getElementById('search-hist').value.toLowerCase();
    const data = (window.historial||[]).filter(h=>`${h.ref||''} ${h.client||''} ${h.project||''}`.toLowerCase().includes(q));
    document.getElementById('history-list').innerHTML = data.length ? data.map(h=>`
      <div class="list-row">
        <div class="flex justify-between gap-3 items-start">
          <div class="min-w-0">
            <b>${esc(h.ref||('AER-'+h.folio))}</b><br>
            <small>${esc(h.client||'Sin cliente')} · ${amount(h.total,h.currency)}</small><br>
            <small>${esc(h.project||'Servicio técnico')}</small>
          </div>
          <div class="flex gap-2 shrink-0">
            <button title="Ver" onclick="viewQuote('${h.id}')">🔍</button>
            <button title="Editar" onclick="editQuote('${h.id}')">✏️</button>
            <button title="PDF" onclick="generateAndSharePDF('${h.id}')">PDF</button>
            <button title="Eliminar" onclick="deleteQuote('${h.id}')">🗑️</button>
          </div>
        </div>
      </div>`).join('') : '<div class="list-row text-slate-400">Sin cotizaciones guardadas.</div>';
  }

  function quoteById(id){
    return (window.historial||[]).find(h=>h.id===id);
  }

  function loadQuoteToForm(h){
    if(!h) return alert('No se encontró la cotización.');
    editingId = h.id;
    window.currentFolio = Number(h.folio || 1000);
    items = normalizeItems((h.items && h.items.length) ? h.items : [defaultItem()]);
    document.getElementById('q-date').value = h.date || '';
    document.getElementById('q-ref').value = h.ref || ('AER-' + (h.folio || 1000));
    document.getElementById('q-currency').value = h.currency || 'CLP';
    document.getElementById('q-client').value = h.client || '';
    document.getElementById('q-project').value = h.project || '';
    document.getElementById('q-location').value = h.location || '';
    document.getElementById('q-desc').value = h.serviceDesc || DEFAULT_SERVICE_DESC;
    document.getElementById('q-validity').value = h.validity || '15 días';
    document.getElementById('q-delivery').value = h.delivery || 'Según coordinación';
    document.getElementById('q-conditions').value = h.conditions || '50% de anticipo para iniciar los trabajos. 50% contra entrega de antecedentes finales.';
    document.getElementById('q-notes').value = h.notes || '';
    renderPreview();
    navTo('edit');
  }

  function editQuote(id){
    loadQuoteToForm(quoteById(id));
  }

  function viewQuote(id){
    loadQuoteToForm(quoteById(id));
  }

  async function deleteQuote(id){
    if(!confirm('¿Eliminar esta cotización del historial?')) return;
    try{
      if(window.fb?.db) await fb.deleteDoc(fb.doc(fb.db,'rps_cotizaciones',id));
      window.historial = (window.historial||[]).filter(h=>h.id!==id);
      renderHistory();
    }catch(e){
      console.error(e);
      alert('No se pudo eliminar: ' + (e.message || e));
    }
  }

  function loadLogoPDF(){
    return new Promise(resolve=>{
      const img = new Image();
      img.onload=()=>resolve({data:RPS_LOGO_DATA,w:img.naturalWidth||img.width,h:img.naturalHeight||img.height});
      img.onerror=()=>resolve(null);
      img.src=RPS_LOGO_DATA;
    });
  }

  async function generateAndSharePDF(historyId=null){
    const JsPDF = window.jspdf?.jsPDF;
    if(!JsPDF) return alert('No se cargó jsPDF.');
    if(!window.html2canvas) return alert('No se cargó html2canvas.');

    let originalState = null;

    if(historyId){
      const h = quoteById(historyId);
      if(!h) return alert('No se encontró la cotización.');
      originalState = { items:[...items], editingId, currentFolio:window.currentFolio };
      loadQuoteToForm(h);
      await new Promise(r=>setTimeout(r,150));
    }

    const q = currentQuote();
    const page = document.querySelector('#pdf-canvas .a4');
    if(!page) return alert('No se encontró el preliminar.');

    const oldTransform = document.getElementById('previewScaler').style.transform;
    document.getElementById('previewScaler').style.transform = 'none';

    const canvas = await html2canvas(page, {
      scale: 2.5,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    document.getElementById('previewScaler').style.transform = oldTransform;
    fitPreview();

    const imgData = canvas.toDataURL('image/png');
    const pdf = new JsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    pdf.addImage(imgData, 'PNG', 0, 0, 210, 297, undefined, 'FAST');
    pdf.save(`COT_${quoteCode(q)}.pdf`);

    if(originalState){
      items = originalState.items;
      editingId = originalState.editingId;
      window.currentFolio = originalState.currentFolio;
      renderPreview();
    }
  }

  async function saveAndSend(){
    const q = currentQuote();
    if(!q.client) return alert('Falta seleccionar o crear cliente.');
    let f = editingId ? Number(window.currentFolio || q.folio || 1000) : (window.nextFolio || 1000);
    try{
      if(!editingId && window.fb?.runTransaction){
        await fb.runTransaction(fb.db,async(t)=>{
          const r=fb.doc(fb.db,'config','rps_cotizador_v1');
          const s=await t.get(r);
          f=s.exists()?Math.max(1000,Number(s.data().lastFolio||1000)):1000;
          s.exists()?t.update(r,{lastFolio:f+1}):t.set(r,{lastFolio:f+1});
        });
      }
      const data={...q, folio:f, ref:q.ref||('AER-'+f), createdAt:new Date().toISOString()};
      if(window.fb?.db){
        if(editingId) await fb.setDoc(fb.doc(fb.db,'rps_cotizaciones',editingId),data);
        else await fb.addDoc(fb.collection(fb.db,'rps_cotizaciones'),data);
      }
      await generateAndSharePDF();
    }catch(e){ console.error(e); alert('No se pudo guardar/enviar: '+(e.message||e)); }
  }

  document.getElementById('q-date').valueAsDate = new Date();
  document.getElementById('q-ref').value = 'AER-1000';
  document.getElementById('q-desc').value = DEFAULT_SERVICE_DESC;
  document.getElementById('i-name').value = DEFAULT_ITEM_TEXT;
  updateClientsUI();
  renderPreview();
  window.addEventListener('resize',fitPreview);
</script>

<script id="rps-final-logic">
(function(){
  function safeJSON(key, fallback){
    try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
    catch(e){ return fallback; }
  }

  window.getLocalNextFolio = function(){
    const local = Number(localStorage.getItem('rps_next_folio') || 0);
    const live = Number(window.nextFolio || 1000);
    return Math.max(1000, local || 1000, live || 1000);
  };

  window.setLocalNextFolio = function(n){
    const v = Math.max(1000, Number(n || 1000));
    localStorage.setItem('rps_next_folio', String(v));
    window.nextFolio = v;
    const ref = document.getElementById('q-ref');
    if(ref && !window.__editingQuoteId) ref.value = 'AER-' + v;
  };

  window.reserveNextFolio = async function(){
    let f = window.getLocalNextFolio();

    if(window.fb?.runTransaction && window.fb?.db){
      try{
        await fb.runTransaction(fb.db, async(t)=>{
          const ref = fb.doc(fb.db, 'config', 'rps_cotizador_v1');
          const snap = await t.get(ref);
          const remote = snap.exists() ? Math.max(1000, Number(snap.data().lastFolio || 1000)) : 1000;
          f = Math.max(f, remote);
          if(snap.exists()) t.update(ref, { lastFolio: f + 1 });
          else t.set(ref, { lastFolio: f + 1 });
        });
      }catch(e){
        console.warn('Folio Firebase falló; usando correlativo local:', e);
      }
    }

    window.setLocalNextFolio(f + 1);
    return f;
  };

  const oldQuoteCode = window.quoteCode;
  window.quoteCode = function(q){
    return q?.ref || ('AER-' + (q?.folio || window.getLocalNextFolio()));
  };

  window.saveQuoteLocal = function(data){
    const arr = safeJSON('rps_cotizaciones_local', []);
    const clean = { ...data, id: data.id || ('local_quote_' + Date.now()) };
    const filtered = arr.filter(x => x.id !== clean.id && x.ref !== clean.ref);
    filtered.push(clean);
    localStorage.setItem('rps_cotizaciones_local', JSON.stringify(filtered));

    const remote = Array.isArray(window.historial) ? window.historial : [];
    window.historial = [...remote.filter(x => x.id !== clean.id && x.ref !== clean.ref), clean]
      .sort((a,b)=>Number(b.folio||0)-Number(a.folio||0));
  };

  window.getMergedHistory = function(){
    const local = safeJSON('rps_cotizaciones_local', []);
    const remote = Array.isArray(window.historial) ? window.historial : [];
    return [...remote, ...local]
      .filter((h,i,a)=>h && (h.id || h.ref) && a.findIndex(x=>(x.id || x.ref)===(h.id || h.ref))===i)
      .sort((a,b)=>Number(b.folio||0)-Number(a.folio||0));
  };

  window.quoteById = function(id){
    return window.getMergedHistory().find(h => String(h.id) === String(id));
  };

  window.applyQuoteToForm = function(h, goEdit=true){
    if(!h) return alert('No se encontró la cotización.');
    window.__editingQuoteId = h.id || null;

    try { editingId = h.id || null; } catch(e){}
    window.currentFolio = Number(h.folio || 1000);

    try { items = normalizeItems((h.items && h.items.length) ? h.items : [defaultItem()]); } catch(e){}

    const set = (id,val)=>{ const el=document.getElementById(id); if(el) el.value = val ?? ''; };
    set('q-date', h.date || '');
    set('q-ref', h.ref || ('AER-' + (h.folio || 1000)));
    set('q-currency', h.currency || 'CLP');
    set('q-client', h.client || '');
    set('q-project', h.project || '');
    set('q-location', h.location || '');
    set('q-desc', h.serviceDesc || DEFAULT_SERVICE_DESC);
    set('q-validity', h.validity || '15 días');
    set('q-delivery', h.delivery || 'Según coordinación');
    set('q-conditions', h.conditions || '50% de anticipo para iniciar los trabajos. 50% contra entrega de antecedentes finales.');
    set('q-notes', h.notes || '');

    renderPreview();
    if(goEdit) navTo('edit');
  };

  window.captureFormState = function(){
    const get = id => document.getElementById(id)?.value || '';
    let clonedItems = [];
    try { clonedItems = JSON.parse(JSON.stringify(items)); } catch(e){}
    let oldEditing = null;
    try { oldEditing = editingId; } catch(e){}
    return {
      items: clonedItems,
      editingId: oldEditing,
      __editingQuoteId: window.__editingQuoteId,
      currentFolio: window.currentFolio,
      fields:{
        date:get('q-date'), ref:get('q-ref'), currency:get('q-currency'),
        client:get('q-client'), project:get('q-project'), location:get('q-location'),
        desc:get('q-desc'), validity:get('q-validity'), delivery:get('q-delivery'),
        conditions:get('q-conditions'), notes:get('q-notes')
      }
    };
  };

  window.restoreFormState = function(state){
    if(!state) return;
    try { items = state.items || [defaultItem()]; } catch(e){}
    try { editingId = state.editingId; } catch(e){}
    window.__editingQuoteId = state.__editingQuoteId;
    window.currentFolio = state.currentFolio;

    const set = (id,val)=>{ const el=document.getElementById(id); if(el) el.value = val ?? ''; };
    set('q-date', state.fields.date);
    set('q-ref', state.fields.ref);
    set('q-currency', state.fields.currency);
    set('q-client', state.fields.client);
    set('q-project', state.fields.project);
    set('q-location', state.fields.location);
    set('q-desc', state.fields.desc);
    set('q-validity', state.fields.validity);
    set('q-delivery', state.fields.delivery);
    set('q-conditions', state.fields.conditions);
    set('q-notes', state.fields.notes);
  };

  window.renderHistory = function(){
    const box = document.getElementById('history-list');
    if(!box) return;
    const q = (document.getElementById('search-hist')?.value || '').toLowerCase();
    const data = window.getMergedHistory().filter(h =>
      `${h.ref||''} ${h.client||''} ${h.project||''}`.toLowerCase().includes(q)
    );

    box.innerHTML = data.length ? data.map(h=>`
      <div class="list-row">
        <div class="flex justify-between gap-3 items-start">
          <div class="min-w-0">
            <b>${esc(h.ref || ('AER-' + h.folio))}</b><br>
            <small>${esc(h.client || 'Sin cliente')} · ${amount(h.total || 0, h.currency || 'CLP')}</small><br>
            <small>${esc(h.project || 'Servicio técnico')}</small>
          </div>
          <div class="list-actions shrink-0">
            <button title="Ver" onclick="viewQuote('${h.id}')">🔍</button>
            <button title="Editar" onclick="editQuote('${h.id}')">✏️</button>
            <button title="PDF" onclick="generateAndSharePDF('${h.id}')">PDF</button>
            <button title="Eliminar" onclick="deleteQuote('${h.id}')">🗑️</button>
          </div>
        </div>
      </div>
    `).join('') : '<div class="list-row text-slate-400">Sin cotizaciones guardadas.</div>';
  };

  window.viewQuote = function(id){ window.applyQuoteToForm(window.quoteById(id), true); };
  window.editQuote = function(id){ window.applyQuoteToForm(window.quoteById(id), true); };

  window.deleteQuote = async function(id){
    const h = window.quoteById(id);
    if(!h) return;
    if(!confirm('¿Eliminar esta cotización?')) return;

    const local = safeJSON('rps_cotizaciones_local', []).filter(x => String(x.id)!==String(id));
    localStorage.setItem('rps_cotizaciones_local', JSON.stringify(local));
    window.historial = (window.historial || []).filter(x => String(x.id)!==String(id));

    try{
      if(window.fb?.db && !String(id).startsWith('local_')){
        await fb.deleteDoc(fb.doc(fb.db,'rps_cotizaciones',id));
      }
    }catch(e){ console.warn(e); }

    renderHistory();
  };

  window.getMergedClients = function(){
    const local = safeJSON('rps_clientes_local', []);
    const remote = Array.isArray(window.clientes) ? window.clientes : [];
    return [...remote, ...local]
      .filter((c,i,a)=>c?.name && a.findIndex(x=>x.name===c.name)===i)
      .sort((a,b)=>a.name.localeCompare(b.name));
  };

  window.updateClientsUI = function(){
    const merged = window.getMergedClients();
    window.clientes = merged;

    const sel = document.getElementById('q-client');
    if(sel){
      const cur = sel.value;
      sel.innerHTML = '<option value="">Seleccionar cliente</option><option value="NEW">➕ Nuevo cliente</option>' +
        merged.map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
      if(cur) sel.value = cur;
    }

    const list = document.getElementById('clients-list');
    if(list){
      list.innerHTML = merged.length ? merged.map(c=>`
        <div class="list-row">
          <div class="flex justify-between gap-3 items-start">
            <div class="min-w-0">
              <b>${esc(c.name || '')}</b><br>
              <small>${esc(c.rut || '')} · ${esc(c.phone || c.email || '')}</small><br>
              <small>${esc(c.address || '')}</small>
            </div>
            <div class="list-actions shrink-0">
              <button title="Editar" onclick="editClient('${c.id}')">✏️</button>
              <button title="Eliminar" onclick="deleteClient('${c.id}')">🗑️</button>
            </div>
          </div>
        </div>
      `).join('') : '<div class="list-row text-slate-400">Sin clientes guardados.</div>';
    }
  };

  window.clearClientForm = function(){
    window.__editingClientId = null;
    ['c-id','c-name','c-rut','c-phone','c-email','c-address'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.value='';
    });
  };

  window.editClient = function(id){
    const c = window.getMergedClients().find(x => String(x.id) === String(id));
    if(!c) return;
    window.__editingClientId = c.id;
    const set = (id,val)=>{ const el=document.getElementById(id); if(el) el.value = val ?? ''; };
    set('c-id', c.id || '');
    set('c-name', c.name || '');
    set('c-rut', c.rut || '');
    set('c-phone', c.phone || '');
    set('c-email', c.email || '');
    set('c-address', c.address || '');
    navTo('clients');
  };

  window.deleteClient = async function(id){
    const c = window.getMergedClients().find(x => String(x.id) === String(id));
    if(!c) return;
    if(!confirm('¿Eliminar este cliente?')) return;

    const local = safeJSON('rps_clientes_local', []).filter(x => String(x.id)!==String(id) && x.name!==c.name);
    localStorage.setItem('rps_clientes_local', JSON.stringify(local));
    window.clientes = (window.clientes || []).filter(x => String(x.id)!==String(id) && x.name!==c.name);

    try{
      if(window.fb?.db && !String(id).startsWith('local_')){
        await fb.deleteDoc(fb.doc(fb.db,'rps_clientes',id));
      }
    }catch(e){ console.warn(e); }

    updateClientsUI();
    renderPreview();
  };

  window.saveClient = async function(){
    const id = document.getElementById('c-id')?.value || window.__editingClientId || ('local_client_' + Date.now());
    const data = {
      id,
      name:(document.getElementById('c-name')?.value || '').trim().toUpperCase(),
      rut:(document.getElementById('c-rut')?.value || '').trim(),
      phone:(document.getElementById('c-phone')?.value || '').trim(),
      email:(document.getElementById('c-email')?.value || '').trim(),
      address:(document.getElementById('c-address')?.value || '').trim()
    };

    if(!data.name) return alert('Ingresa el nombre del cliente.');

    const local = safeJSON('rps_clientes_local', []).filter(c => c.id!==data.id && c.name!==data.name);
    local.push(data);
    localStorage.setItem('rps_clientes_local', JSON.stringify(local));
    window.clientes = [...(window.clientes || []).filter(c=>c.id!==data.id && c.name!==data.name), data];

    try{
      if(window.fb?.db){
        if(data.id && !String(data.id).startsWith('local_')) await fb.setDoc(fb.doc(fb.db,'rps_clientes',data.id), data);
        else await fb.addDoc(fb.collection(fb.db,'rps_clientes'), data);
      }
    }catch(e){ console.warn(e); }

    clearClientForm();
    updateClientsUI();
    navTo('edit');
    const sel=document.getElementById('q-client');
    if(sel) sel.value=data.name;
    renderPreview();
  };

  window.generateAndSharePDF = async function(historyId=null, quoteOverride=null){
    const JsPDF = window.jspdf?.jsPDF;
    if(!JsPDF) return alert('No se cargó jsPDF.');
    if(!window.html2canvas) return alert('No se cargó html2canvas.');

    let original = null;

    if(quoteOverride){
      original = captureFormState();
      applyQuoteToForm(quoteOverride, false);
      renderPreview();
      await new Promise(r=>setTimeout(r,220));
    }else if(historyId){
      const h = quoteById(historyId);
      if(!h) return alert('No se encontró la cotización.');
      original = captureFormState();
      applyQuoteToForm(h, false);
      renderPreview();
      await new Promise(r=>setTimeout(r,220));
    }

    const q = quoteOverride || (historyId ? quoteById(historyId) : currentQuote());
    const page = document.querySelector('#pdf-canvas .a4');
    const scaler = document.getElementById('previewScaler');
    if(!page || !scaler) return alert('No se encontró el preliminar.');

    const oldTransform = scaler.style.transform;
    scaler.style.transform = 'none';

    const canvas = await html2canvas(page, {
      scale: 2.6,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false
    });

    scaler.style.transform = oldTransform;
    fitPreview();

    const img = canvas.toDataURL('image/png');
    const pdf = new JsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    pdf.addImage(img, 'PNG', 0, 0, 210, 297, undefined, 'FAST');
    pdf.save(`COT_${quoteCode(q)}.pdf`);

    if(original){
      restoreFormState(original);
      renderPreview();
    }
  };

  window.saveAndSend = async function(){
    const q0 = currentQuote();
    if(!q0.client) return alert('Falta seleccionar o crear cliente.');

    let oldEditing = null;
    try { oldEditing = editingId; } catch(e){}
    let f = oldEditing ? Number(window.currentFolio || q0.folio || 1000) : await reserveNextFolio();
    if(f < 1000) f = 1000;

    const data = {
      ...q0,
      id: oldEditing || ('local_quote_' + Date.now()),
      folio:f,
      ref: oldEditing ? (q0.ref || ('AER-' + f)) : ('AER-' + f),
      createdAt:new Date().toISOString()
    };

    try{
      if(window.fb?.db){
        if(oldEditing && !String(oldEditing).startsWith('local_')){
          await fb.setDoc(fb.doc(fb.db,'rps_cotizaciones',oldEditing), data);
        }else{
          await fb.addDoc(fb.collection(fb.db,'rps_cotizaciones'), data);
        }
      }
    }catch(e){
      console.warn('No se pudo guardar en Firebase; guardando local:', e);
    }

    saveQuoteLocal(data);
    await generateAndSharePDF(null, data);

    try { editingId = null; } catch(e){}
    window.__editingQuoteId = null;
    window.currentFolio = null;
    try { items = [defaultItem()]; } catch(e){}

    const ref = document.getElementById('q-ref');
    if(ref) ref.value = 'AER-' + getLocalNextFolio();
    const name = document.getElementById('i-name');
    if(name) name.value = DEFAULT_ITEM_TEXT;
    const qty = document.getElementById('i-qty');
    if(qty) qty.value = 1;
    const price = document.getElementById('i-price');
    if(price) price.value = '';

    renderPreview();
    renderHistory();
  };

  const oldFit = window.fitPreview;
  window.fitPreview = function(){
    const box = document.getElementById('previewBox');
    const scaler = document.getElementById('previewScaler');
    if(!box || !scaler) return;

    const pageW = scaler.offsetWidth || 794;
    const pageH = scaler.offsetHeight || 1123;
    const s = Math.min((box.clientWidth - 36) / pageW, (box.clientHeight - 36) / pageH, 1.15);
    scaler.style.transform = `scale(${Math.max(.1, s)})`;
  };

  // Inicialización final segura
  setTimeout(()=>{
    const ref = document.getElementById('q-ref');
    if(ref && (!ref.value || ref.value === 'AER-1000')) ref.value = 'AER-' + getLocalNextFolio();

    updateClientsUI();
    renderHistory();
    renderPreview();
    fitPreview();
  }, 350);
})();
</script>

</body>
