
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>RPS Topografía & Geodesia | Professional Suite</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #0a0f1a;
      --panel: #161e2e;
      --panel2: #1f2937;
      --accent: #f59e0b; /* Amber Gold */
      --accent-dark: #b45309;
      --text: #f9fafb;
      --muted: #94a3b8;
      --border: rgba(245, 158, 11, 0.3);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; background: var(--bg); color: var(--text); }
    
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(245, 158, 11, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(30, 58, 138, 0.1) 0%, transparent 40%);
    }

    /* Navegación Premium */
    .topnav {
      position: sticky; top: 0; z-index: 50;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      background: rgba(10, 15, 26, 0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(15px);
    }
    .topnav button {
      padding: 20px 10px; font-size: 12px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); transition: all 0.4s;
    }
    .topnav button.active { color: var(--accent); background: rgba(245, 158, 11, 0.05); }

    .tab { display: none; padding: 20px; animation: fadeIn 0.5s ease forwards; }
    .tab.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .layout {
      display: grid; grid-template-columns: 420px 1fr; gap: 30px;
      max-width: 1600px; margin: 0 auto; align-items: start;
    }

    /* Cards y UI */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .stack > * + * { margin-top: 18px; }

    .input {
      width: 100%; background: #0d111c; border: 1px solid rgba(148, 163, 184, 0.2);
      color: #fff; border-radius: 12px; padding: 14px 16px; font-size: 15px; outline: none;
      transition: all 0.3s;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15); }
    textarea.input { min-height: 120px; }

    .btn {
      width: 100%; border-radius: 14px; padding: 16px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s;
      background: linear-gradient(135deg, var(--accent), #d97706); color: #000;
      box-shadow: 0 10px 25px rgba(245, 158, 11, 0.25);
    }
    .btn:active { transform: scale(0.98); }
    .btn.green { background: linear-gradient(135deg, #10b981, #059669); color: #fff; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2); }

    /* PRELIMINAR - ZOOM NATIVO */
    #previewBox {
      width: 100%; height: calc(100vh - 120px);
      background: #111827; border-radius: 24px;
      border: 1px solid var(--border);
      overflow: auto; /* IMPORTANTE: Permite zoom nativo con dedos */
      display: flex; justify-content: center; padding: 40px 20px;
    }

    #pdf-canvas {
      width: 100%; max-width: 800px; /* Tamaño base para preview */
      display: flex; flex-direction: column;
    }

    .a4 {
      width: 100%; aspect-ratio: 210/297; background: white; color: #1f2937;
      padding: 12mm; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      display: flex; flex-direction: column; box-sizing: border-box;
      font-size: 10pt; line-height: 1.4;
    }

    /* Estilos PDF Internos */
    .pdf-h { border-bottom: 2px solid #f59e0b; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; }
    .pdf-body-card { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
    .pdf-bar { background: #1f2937; color: white; padding: 6px 12px; font-size: 8pt; font-weight: bold; text-transform: uppercase; }
    .pdf-bar.gold { background: #f59e0b; color: #000; }
    .pdf-content { padding: 10px 12px; }

    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      #previewBox { height: 60vh; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <button id="tab-edit-btn" class="active" onclick="navTo('edit')">Cotizador</button>
    <button id="tab-hist-btn" onclick="navTo('hist')">Historial</button>
    <button id="tab-clients-btn" onclick="navTo('clients')">Clientes</button>
  </nav>

  <section id="tab-edit" class="tab active">
    <div class="layout">
      <div class="stack">
        <div class="card stack">
          <div class="grid grid-cols-2 gap-3">
            <input id="q-date" type="date" class="input" oninput="renderPreview()">
            <input id="q-ref" type="text" class="input" placeholder="Referencia" oninput="renderPreview()">
          </div>
          <select id="q-client" class="input" onchange="handleClientSelect()">
            <option value="">Seleccionar Cliente</option>
            <option value="NEW">➕ Nuevo Cliente</option>
          </select>
          <input id="q-project" class="input" placeholder="Nombre del Proyecto" oninput="renderPreview()">
          <textarea id="q-desc" class="input" placeholder="Descripción General" oninput="renderPreview()"></textarea>
        </div>

        <div class="card stack">
          <textarea id="i-name" class="input" placeholder="Detalle técnico del ítem"></textarea>
          <div class="grid grid-cols-2 gap-3">
            <input id="i-qty" type="number" class="input" value="1" oninput="renderPreview()">
            <input id="i-price" type="number" class="input" placeholder="Precio Neto" oninput="renderPreview()">
          </div>
          <button class="btn" onclick="addItem()">Guardar / Actualizar Ítem</button>
        </div>

        <div id="items-list" class="flex flex-col gap-3"></div>

        <button class="btn green" onclick="saveAndSend()">Guardar y Descargar PDF</button>
      </div>

      <div id="previewBox">
        <div id="pdf-canvas"></div>
      </div>
    </div>
  </section>

  <section id="tab-hist" class="tab">
    <div class="max-w-4xl mx-auto stack">
      <div id="history-list" class="grid gap-4"></div>
    </div>
  </section>

  <section id="tab-clients" class="tab">
    <div class="max-w-2xl mx-auto card stack">
      <input id="c-name" class="input" placeholder="Nombre Empresa / Cliente">
      <input id="c-rut" class="input" placeholder="RUT">
      <input id="c-email" class="input" placeholder="Email">
      <button class="btn" onclick="saveClient()">Guardar Cliente</button>
      <div id="clients-list" class="mt-6 flex flex-col gap-3"></div>
    </div>
  </section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
    authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
    projectId: "registro-de-gastos-a21e8",
    storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
    messagingSenderId: "947355933583",
    appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window.fb = { db, collection, addDoc, setDoc, doc };

  // Listeners
  onSnapshot(collection(db, "rps_clientes"), snap => {
    window.clientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
    updateClientsUI();
  });

  onSnapshot(collection(db, "rps_cotizaciones"), snap => {
    window.historial = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=> b.date?.localeCompare(a.date));
    renderHistory();
  });
</script>

<script>
  // Datos y Estado
  let items = [];
  let editingIdx = null;
  const DEFAULT_DESC = "Levantamiento topográfico georreferenciado mediante sistema GNSS de alta precisión.";

  function navTo(t) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.topnav button').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('tab-'+t+'-btn').classList.add('active');
  }

  function addItem() {
    const n = document.getElementById('i-name').value;
    const q = Number(document.getElementById('i-qty').value);
    const p = Number(document.getElementById('i-price').value);
    if(!n || !p) return alert("Completa el detalle y precio");

    const obj = { name: n, qty: q, price: p, total: q * p };
    if(editingIdx !== null) { items[editingIdx] = obj; editingIdx = null; }
    else { items.push(obj); }

    document.getElementById('i-name').value = "";
    document.getElementById('i-price').value = "";
    renderPreview();
  }

  function renderPreview() {
    const qDate = document.getElementById('q-date').value;
    const qRef = document.getElementById('q-ref').value || "COT-001";
    const qProj = document.getElementById('q-project').value || "Proyecto Topográfico";
    const qDesc = document.getElementById('q-desc').value || "Sin descripción";
    const clientName = document.getElementById('q-client').value || "---";

    const neto = items.reduce((s, i) => s + i.total, 0);
    const iva = Math.round(neto * 0.19);
    const total = neto + iva;

    const canvas = document.getElementById('pdf-canvas');
    canvas.innerHTML = `
      <div class="a4">
        <div class="pdf-h">
          <div>
            <h1 style="font-size:16pt; font-weight:bold; color:#111827">RPS TOPOGRAFÍA</h1>
            <p style="font-size:8pt; color:#6b7280">Ingeniería, Geodesia y Fotogrametría</p>
          </div>
          <div style="text-align:right">
            <span class="quoteTag">Cotización Técnica</span>
            <div class="quoteNum">${qRef}</div>
            <div class="quoteDate">Fecha: ${qDate}</div>
          </div>
        </div>

        <div class="grid2">
          <div class="pdf-body-card">
            <div class="pdf-bar">En atención a</div>
            <div class="pdf-content">
              <h3>${clientName.toUpperCase()}</h3>
              <p>Proyecto: ${qProj}</p>
            </div>
          </div>
          <div class="pdf-body-card">
            <div class="pdf-bar gold">Resumen Económico</div>
            <div class="pdf-content">
              <div style="display:flex; justify-content:space-between"><span>Neto:</span><strong>$${neto.toLocaleString('es-CL')}</strong></div>
              <div style="display:flex; justify-content:space-between"><span>Total:</span><strong>$${total.toLocaleString('es-CL')}</strong></div>
            </div>
          </div>
        </div>

        <div class="pdf-body-card">
          <div class="pdf-bar">Alcance del Servicio</div>
          <div class="desc"><p>${qDesc}</p></div>
        </div>

        <div class="pdf-body-card">
          <div class="pdf-bar">Desglose de Ítems</div>
          <div class="pdf-content">
            ${items.map(i => `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:5px 0">
              <span>${i.name} (x${i.qty})</span><strong>$${i.total.toLocaleString('es-CL')}</strong>
            </div>`).join('')}
          </div>
        </div>

        <div class="signature">
          <div class="sigLine"></div>
          <b>Robin Pinto Serrano</b><br>
          <span style="font-size:7pt">Ingeniero Industrial / Topógrafo</span>
        </div>
      </div>
    `;
    updateItemsUI();
  }

  function updateItemsUI() {
    const list = document.getElementById('items-list');
    list.innerHTML = items.map((it, i) => `
      <div class="item-row flex justify-between items-center">
        <span class="truncate w-40 font-bold">${it.name}</span>
        <span class="text-accent font-bold">$${it.total.toLocaleString('es-CL')}</span>
        <div class="flex gap-2">
          <button onclick="editIt(${i})">✏️</button>
          <button onclick="items.splice(${i},1);renderPreview();">✕</button>
        </div>
      </div>
    `).join('');
  }

  function editIt(i) {
    const it = items[i];
    document.getElementById('i-name').value = it.name;
    document.getElementById('i-qty').value = it.qty;
    document.getElementById('i-price').value = it.price;
    editingIdx = i;
  }

  async function saveAndSend() {
    const qRef = document.getElementById('q-ref').value;
    const qProj = document.getElementById('q-project').value;
    const client = document.getElementById('q-client').value;
    
    if(!client || items.length === 0) return alert("Falta cliente o ítems");

    const data = {
      ref: qRef, project: qProj, client: client,
      date: document.getElementById('q-date').value,
      items: items,
      total: items.reduce((s,i) => s + i.total, 0) * 1.19
    };

    try {
      await fb.addDoc(fb.collection(fb.db, "rps_cotizaciones"), data);
      generatePDF(data);
    } catch(e) { alert("Error al guardar"); }
  }

  function generatePDF(d) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFillColor(10, 15, 26);
    doc.rect(0, 0, 210, 40, 'F');
    
    doc.setTextColor(245, 158, 11);
    doc.setFontSize(22);
    doc.text("RPS TOPOGRAFÍA", 15, 25);
    
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(10);
    doc.text(`N° REF: ${d.ref}`, 195, 20, {align: 'right'});
    doc.text(`FECHA: ${d.date}`, 195, 28, {align: 'right'});

    doc.setTextColor(0, 0, 0);
    doc.setFontSize(14);
    doc.text("COTIZACIÓN DE SERVICIOS PROFESIONALES", 105, 55, {align: 'center'});
    
    doc.setFontSize(11);
    doc.text(`CLIENTE: ${d.client}`, 15, 75);
    doc.text(`PROYECTO: ${d.project}`, 15, 82);

    let y = 100;
    doc.setFillColor(243, 244, 246);
    doc.rect(15, y, 180, 8, 'F');
    doc.text("DETALLE", 20, y+6);
    doc.text("TOTAL", 170, y+6);
    
    y += 15;
    d.items.forEach(it => {
      doc.text(it.name, 20, y);
      doc.text(`$${it.total.toLocaleString('es-CL')}`, 170, y);
      y += 10;
    });

    doc.setFont("helvetica", "bold");
    doc.text(`TOTAL FINAL (IVA INC.): $${Math.round(d.total).toLocaleString('es-CL')}`, 195, y+20, {align: 'right'});

    doc.save(`RPS_${d.ref}.pdf`);
  }

  function handleClientSelect() {
    if(document.getElementById('q-client').value === 'NEW') navTo('clients');
    renderPreview();
  }

  async function saveClient() {
    const n = document.getElementById('c-name').value;
    if(!n) return;
    await fb.addDoc(fb.collection(fb.db, "rps_clientes"), {name: n, rut: document.getElementById('c-rut').value});
    document.getElementById('c-name').value = "";
    navTo('edit');
  }

  function updateClientsUI() {
    const sel = document.getElementById('q-client');
    const val = sel.value;
    sel.innerHTML = '<option value="">Seleccionar Cliente</option><option value="NEW">➕ Nuevo Cliente</option>' + 
      window.clientes.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    sel.value = val;

    document.getElementById('clients-list').innerHTML = window.clientes.map(c => `
      <div class="list-row flex justify-between">
        <b>${c.name}</b>
        <span>${c.rut || ''}</span>
      </div>
    `).join('');
  }

  function renderHistory() {
    document.getElementById('history-list').innerHTML = window.historial.map(h => `
      <div class="card flex justify-between items-center">
        <div>
          <b class="text-accent">${h.ref}</b> - ${h.client}<br>
          <small class="text-muted">${h.project}</small>
        </div>
        <div class="flex gap-3">
          <button class="btn small" style="width:auto" onclick='downloadHist("${h.id}")'>PDF</button>
        </div>
      </div>
    `).join('');
  }

  window.downloadHist = (id) => {
    const h = window.historial.find(x => x.id === id);
    generatePDF(h);
  };

  window.onload = () => {
    document.getElementById('q-date').valueAsDate = new Date();
    renderPreview();
  };
</script>
</body>
</html>
