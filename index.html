  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, deleteDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
      authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
      projectId: "registro-de-gastos-a21e8",
      storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
      messagingSenderId: "947355933583",
      appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.fb = { db, doc, collection, addDoc, deleteDoc, setDoc, runTransaction };

    onSnapshot(doc(db, "config", "rps_cotizador_v1"), (d) => {
      window.nextFolio = d.exists() ? Number(d.data().lastFolio) : 1000;
      renderPreview();
    });

    onSnapshot(collection(db, "rps_clientes"), (s) => {
      window.clientes = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (a.name || '').localeCompare(b.name || ''));
      updateClientsUI();
      renderPreview();
    });

    onSnapshot(collection(db, "rps_cotizaciones"), (s) => {
      window.historial = s.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => Number(b.folio || 0) - Number(a.folio || 0));
      renderHistory();
    });
  </script>

    .bottom-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6mm; margin-top:8mm; position:relative; z-index:1; }

<script>
  const DEFAULT_SERVICE_DESC = `Junto con saludar, por medio de la presente se cotiza el servicio de levantamiento topográfico georreferenciado para terreno de aproximadamente 5.000 m², ubicado en sector por definir, considerando trabajos de terreno, procesamiento de información técnica y entrega de antecedentes conforme al alcance indicado.`;

  const DEFAULT_ITEM_TEXT = `Levantamiento topográfico georreferenciado de todos los elementos relevantes del terreno mediante sistema GNSS de alta precisión, considerando bordes de calzada, líneas de cierre, líneas de edificación, líneas prediales, postes, cámaras y demás elementos existentes en terreno.

Se considera además postproceso de datos crudos GNSS (GPS) para obtención de coordenadas UTM Datum SIRGAS (WGS84) Huso 19 Sur, vinculadas a punto de control SIRGAS-IGM.

Incluye planificación de vuelo dron, captura aerofotogramétrica y postproceso de información técnica.

Entregables:
• Plano topográfico
• Informe técnico
• Nube de puntos densa
• Ortomosaico`;

  function defaultItem(){ return { name: DEFAULT_ITEM_TEXT, qty: 1, price: 0, total: 0, isDefault: true }; }
  let items = [defaultItem()], editingId = null;
  document.getElementById('q-date-input').valueAsDate = new Date();

  const COMPANY = {
    name: 'RPS TOPOGRAFÍA & GEODESIA',
    legalName: 'ROBIN PINTO SERRANO SERVICIOS DE TOPOGRAFÍA Y GEODESIA E.I.R.L.',
    rut: '77.444.231-6',
    giro: 'Servicios topográficos y geodésicos, chequeo de deslindes',

    comuna: 'Isla de Maipo',
    city: 'Santiago',
    email: 'contacto@rpsgeodesia.com',
    web: 'www.rpsgeodesia.com',
    phone: '949207665',
    bank: 'Banco Estado',
    account: 'Cta Vista Banco Estado N° 36772581224',
    holder: 'ROBIN PINTO SERRANO SERVICIOS DE TOPOGRAFÍA Y GEODESIA E.I.R.L.'
  };

  function navTo(sec){
    ['edit','hist','clients'].forEach(s=>{
      document.getElementById('sec-'+s).classList.toggle('active',s===sec);
      const b=document.getElementById('m-'+s);
      b.classList.toggle('text-blue-400',s===sec); b.classList.toggle('border-blue-400',s===sec);
      b.classList.toggle('text-slate-500',s!==sec); b.classList.toggle('border-transparent',s!==sec);
    });
    scrollTo(0,0);
  }

  function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
  function money(n){ return '$ ' + Number(n || 0).toLocaleString('es-CL'); }
  function uf(n){ return 'UF ' + Number(n || 0).toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function amount(n, currency){ return currency === 'UF' ? uf(n) : money(n); }
  function amountEquivalent(n, currency, ufValue){ return (currency === 'UF' && Number(ufValue || 0) > 0) ? money(Number(n || 0) * Number(ufValue || 0)) : ''; }
  
  function quoteCode(q){
    const folioBase = (q && q.folio) ? q.folio : (window.nextFolio || 1000);
    return (q && q.ref) ? q.ref : ('AER-' + folioBase);
  }

  function fmtDate(d){ return d ? new Date(d+'T12:00:00').toLocaleDateString('es-CL') : '--/--/----'; }
  function handleCurrencyChange(){
    const cur = document.getElementById('q-currency')?.value || 'CLP';
    const priceInput = document.getElementById('i-price');
    if (priceInput) {
      priceInput.placeholder = cur === 'UF' ? 'Precio neto en UF' : 'Precio neto en pesos';
    }
    renderPreview();
  }
  function selectedClient(){ const n=document.getElementById('q-client').value; return (window.clientes || []).find(c=>c.name===n) || {name:n}; }
  function currentQuote(){
    const neto = items.reduce((s,i)=>s+Number(i.total||0),0); const iva = Math.round(neto*.19);
    return {
      folio: editingId ? window.currentFolio : (window.nextFolio || 1000),
      date: document.getElementById('q-date-input')?.value || '',
      ref: document.getElementById('q-ref')?.value || '',
      currency: document.getElementById('q-currency')?.value || 'CLP',
      ufValue: 0,
      client: document.getElementById('q-client')?.value || '',
      project: document.getElementById('q-project')?.value || '',
      location: document.getElementById('q-location')?.value || '',
      serviceDesc: document.getElementById('q-service-desc')?.value || DEFAULT_SERVICE_DESC,
      intro: '',
      validity: document.getElementById('q-validity')?.value || '15 días',
      delivery: document.getElementById('q-delivery')?.value || 'Según coordinación',
      conditions: document.getElementById('q-conditions')?.value || '',
      notes: document.getElementById('q-notes')?.value || '',
      items: [...items], neto, iva, total: neto + iva
    };
  }

  function renderPreview(){
    const q = currentQuote(), c = selectedClient();

    function previewAmount(n){
      return amount(n, q.currency);
    }

    function previewEquivalent(n){
      return amountEquivalent(n, q.currency, q.ufValue);
    }

    function parsePreviewService(txt){
      const raw = String(txt || '').trim();
      const parts = raw.split(/Entregables\s*:/i);
      const scope = (parts[0] || raw).trim();
      let deliverables = [];
      if(parts[1]){
        deliverables = parts[1]
          .split(/\n|•|-/)
          .map(x => x.replace(/\s+/g,' ').trim())
          .filter(Boolean);
      }
      if(!deliverables.length){
        deliverables = ['Plano topográfico', 'Informe técnico', 'Nube de puntos densa', 'Ortomosaico'];
      }
      return { scope, deliverables };
    }

    const currencyText = q.currency === 'UF'
      ? 'Unidad de Fomento (UF)'
      : 'Pesos chilenos (CLP)';

    const serviceCards = (q.items.length ? q.items : [defaultItem()]).map((it, i) => {
      const parsed = parsePreviewService(it.name || '');
      const entregables = parsed.deliverables.map(d => `<span>• ${esc(d)}</span>`).join('');

      return `
        <section class="preview-service">
          <div class="preview-section-bar dark">Servicio profesional${q.items.length > 1 ? ' ' + (i + 1) : ''}</div>
          <div class="preview-service-full">
            <h4>Alcance técnico</h4>
            <p>${esc(parsed.scope).replace(/\n/g, '<br>')}</p>

            <h4>Entregables</h4>
            <div class="preview-deliverables">${entregables}</div>
          </div>
        </section>`;
    }).join('');

    const qty = (q.items.length ? q.items : [defaultItem()]).reduce((s,it)=>s+Number(it.qty||0),0) || 1;
    const unit = (q.items.length === 1 ? Number(q.items[0]?.price || 0) : Number(q.neto || 0));

    document.getElementById('pdf-canvas').innerHTML = `
      <div class="preview-page-compact">
        <header class="preview-header-compact">
          <div class="preview-brand-compact">
            <img src="logo.png" onerror="this.style.display='none'">
            <div>
              <h1>${COMPANY.name}</h1>
              <p>Servicios topográficos y geodésicos</p>
              <p>${COMPANY.email} · Fono: ${COMPANY.phone}</p>
            </div>
          </div>

          <div class="preview-quote-compact">
            <div>Cotización técnica</div><small class="quote-service-label">Servicio de topografía</small>
            <strong>N° ${esc(quoteCode(q))}</strong>
            <span>Fecha: ${fmtDate(q.date)}</span>
          </div>
        </header>

        

        <section class="preview-info-grid">
          <div class="preview-info-card">
            <div class="preview-section-bar dark">En atención a</div>
            <h3>${esc((c.name || '---').toUpperCase())}</h3>
            <p><b>RUT:</b> ${esc(c.rut || '—')}</p>
            <p><b>Dirección:</b> ${esc(c.address || '—')}</p>
            <p><b>Contacto:</b> ${esc(c.phone || c.email || '—')}</p>
          </div>

          <div class="preview-info-card">
            <div class="preview-section-bar blue">Antecedentes del proyecto</div>
            <div class="preview-project-lines">
              <p><b>Proyecto:</b> ${esc(q.project || 'Servicio técnico')}</p>
              <p><b>Ubicación:</b> ${esc(q.location || 'Por definir')}</p>
              <p><b>Validez:</b> ${esc(q.validity || '15 días')}</p>
              <p><b>Entrega:</b> ${esc(q.delivery || 'Según coordinación')}</p>
              <p><b>Moneda:</b> ${esc(currencyText)}</p>
            </div>
          </div>
        </section>

        <section class="preview-description">
          <div class="preview-section-bar blue">Descripción del servicio</div>
          <p>${esc(q.serviceDesc || DEFAULT_SERVICE_DESC).replace(/\n/g, '<br>')}</p>
        </section>

        ${serviceCards}

        <section class="preview-closure-grid merged">
          <div class="preview-small-card">
            <div class="preview-section-bar blue">Condiciones comerciales</div>
            <p>${esc(q.conditions || '50% de anticipo para iniciar los trabajos. 50% contra entrega de antecedentes finales.').replace(/\n/g, '<br>')}</p>
          </div>

          <div class="preview-small-card">
            <div class="preview-section-bar dark">Transferencia</div>
            <p><b>Nombre:</b> ${COMPANY.holder}</p>
            <p><b>RUT:</b> ${COMPANY.rut}</p>
            <p>${COMPANY.bank} · ${COMPANY.account}</p>
            <p>${COMPANY.email}</p>
          </div>

          <div class="preview-total-card">
            <div class="preview-section-bar blue">Valor del servicio</div>

            <hr>
            <div class="total"><span>Total</span><strong>${previewAmount(q.total)}</strong></div>
            ${q.currency === 'UF' && q.ufValue > 0 ? `<small>Equiv.: ${previewEquivalent(q.total)}</small>` : ''}

        <section class="preview-signature">

    setTimeout(fitPreviewZoom, 60);

  function loadLogoPDF(){
    return new Promise(resolve=>{ const img=new Image(); img.crossOrigin='anonymous'; img.onload=()=>{ try{ const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight; c.getContext('2d').drawImage(img,0,0); resolve({data:c.toDataURL('image/png'),w:c.width,h:c.height}); }catch(e){resolve(null)} }; img.onerror=()=>resolve(null); img.src='logo.png'; });
  }

  async function generateAndSharePDF(historyId=null, clientName=null, mode='save'){
    const JsPDF = window.jspdf?.jsPDF;
    if(!JsPDF) return alert('No se cargó jsPDF.');

    let q = historyId ? (window.historial || []).find(x => x.id === historyId) : currentQuote();
    if(!q) return alert('No se encontró la cotización.');

    q.currency = q.currency || 'CLP';
    q.ufValue = Number(q.ufValue || 0);

    const c = (window.clientes || []).find(x => x.name === q.client) || { name: q.client };
    const quoteItems = (q.items || []).length ? q.items : [defaultItem()];

    q.neto = quoteItems.reduce((s,i) => s + Number(i.total || 0), 0);
    q.iva = Math.round(q.neto * 0.19);
    q.total = q.neto + q.iva;

    const pdf = new JsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const logo = await loadLogoPDF();

    const W = 210, H = 297, M = 12, CW = W - (M * 2);
    const GRAFITO = [15, 23, 42];
    const GRAFITO_2 = [30, 41, 59];
    const AZUL_OSCURO = [20, 52, 93];
    const AZUL_SUAVE = [239, 246, 255];
    const GRIS = [100, 116, 139];
    const GRIS_SUAVE = [248, 250, 252];
    const LINEA = [203, 213, 225];
    const BLANCO = [255,255,255];
    let y = 11;

    function clean(v){ return String(v ?? '').replace(/\r/g,'').replace(/[ \t]+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim(); }
    function cleanInline(v){ return String(v ?? '').replace(/\s+/g,' ').trim(); }
    function displayAmount(n){ return amount(n, q.currency); }
    function displayEq(n){ return amountEquivalent(n, q.currency, q.ufValue); }
    function split(v,w){ return pdf.splitTextToSize(clean(v), w); }
    function put(v,x,yy,opt={}){ Array.isArray(v) ? pdf.text(v, x, yy, opt) : pdf.text(String(v ?? ''), x, yy, opt); }
    function setFont(size, style='normal', color=GRAFITO){ pdf.setFont('helvetica', style); pdf.setFontSize(size); pdf.setTextColor(...color); }
    function stroke(color=LINEA, width=.22){ pdf.setDrawColor(...color); pdf.setLineWidth(width); }
    function fill(color){ pdf.setFillColor(...color); }

    function footer(){
      stroke(AZUL_OSCURO,.45); pdf.line(M, H-10, W-M, H-10);
      setFont(5.9,'normal',GRIS);
      const footerText = `${COMPANY.name} · ${COMPANY.address} · ${COMPANY.comuna} · ${COMPANY.email} · Fono: ${COMPANY.phone}`;
      put(footerText, W/2, H-6.2, { align:'center', maxWidth:CW });
    }
    function titleBar(title, x, yy, w, color=AZUL_OSCURO){
      fill(color); pdf.roundedRect(x, yy, w, 6.8, 1.2, 1.2, 'F');
      setFont(6.35,'bold',BLANCO); put(title.toUpperCase(), x+2.5, yy+4.65);
    }
    function header(){
      if(logo){ const lw=27; const lh=Math.min(13, lw/(logo.w/logo.h)); pdf.addImage(logo.data,'PNG',M,y,lw,lh); }
      setFont(12.2,'bold',GRAFITO); put(COMPANY.name, M+33, y+4.5);
      setFont(6.7,'normal',GRIS); put('Servicios topográficos y geodésicos', M+33, y+8.8); put(`${COMPANY.email} · Fono: ${COMPANY.phone}`, M+33, y+12.8);
      fill(AZUL_OSCURO); pdf.roundedRect(W-M-46,y,46,11,1.3,1.3,'F'); setFont(6.7,'bold',BLANCO); put('COTIZACIÓN TÉCNICA', W-M-23, y+7, {align:'center'});
      setFont(15.5,'bold',GRAFITO); put(`N° ${quoteCode(q)}`, W-M, y+20, {align:'right'}); setFont(7.1,'normal',GRIS); put(`Fecha: ${fmtDate(q.date)}`, W-M, y+25, {align:'right'});
      y += 29; stroke(AZUL_OSCURO,.75); pdf.line(M,y,W-M,y); y += 5;
    }
    function infoBox(){
      const h=32, leftW=78, rightX=M+leftW+5, rightW=CW-leftW-5;
      stroke(LINEA,.22); fill(BLANCO); pdf.roundedRect(M,y,leftW,h,1.6,1.6,'FD'); pdf.roundedRect(rightX,y,rightW,h,1.6,1.6,'FD');
      titleBar('En atención a',M,y,leftW,GRAFITO_2); titleBar('Antecedentes del proyecto',rightX,y,rightW,AZUL_OSCURO);
      setFont(7.3,'bold',GRAFITO); put(split((c.name || '---').toUpperCase(), leftW-6), M+2.6, y+12.3);
      setFont(6.3,'normal',GRIS); put(`RUT: ${c.rut || '—'}`, M+2.6, y+19.5); put(`Dirección: ${c.address || '—'}`, M+2.6, y+24.2, {maxWidth:leftW-5}); put(`Contacto: ${c.phone || c.email || '—'}`, M+2.6, y+29);
      const lx=rightX+2.6, vx=rightX+23; let yy=y+12.3;
      function lv(label,value){ setFont(6.3,'bold',GRIS); put(label,lx,yy); setFont(6.3,'normal',GRAFITO); put(split(value || '—', rightW-27), vx, yy); yy += 4.25; }
      lv('Proyecto:', q.project || 'Servicio técnico'); lv('Ubicación:', q.location || 'Por definir'); lv('Validez:', q.validity || '15 días'); lv('Entrega:', q.delivery || 'Según coordinación');
      setFont(6.3,'bold',GRIS); put('Moneda:', lx, yy); setFont(6.3,'normal',GRAFITO); const currencyText = q.currency==='UF' ? `UF${q.ufValue ? ' · Valor UF: ' + money(q.ufValue) : ''}` : 'Pesos chilenos (CLP)'; put(currencyText, vx, yy);
      y += h + 5;
    }
    function descriptionBlock(){
      const padX = 4.8;
      const textW = CW - (padX * 2);
      const lines = split(q.serviceDesc || DEFAULT_SERVICE_DESC, textW);
      const h = Math.max(21, lines.length * 3.25 + 14);

      stroke(LINEA,.22);
      fill(BLANCO);
      pdf.roundedRect(M, y, CW, h, 1.6, 1.6, 'FD');
      titleBar('Descripción del servicio', M, y, CW, AZUL_OSCURO);

      setFont(6.95,'normal',GRAFITO);
      put(lines, M + padX, y + 12.8, { maxWidth: textW });
      y += h + 4.5;
    }

    function parseServiceText(txt){
      const raw=clean(txt); const parts=raw.split(/Entregables\s*:/i); const scope=clean(parts[0] || raw); let deliverables=[];
      if(parts[1]) deliverables=parts[1].split(/\n|•|-/).map(x=>cleanInline(x)).filter(Boolean);
      return {scope, deliverables};
    }
    function serviceProposal(it,index){
      const parsed=parseServiceText(it.name || '');
      const textW=CW-7;
      const scopeLines=split(parsed.scope, textW);
      const deliverables=parsed.deliverables.length ? parsed.deliverables : ['Plano topográfico','Informe técnico','Nube de puntos densa','Ortomosaico'];
      const scopeH=scopeLines.length*3.18+12;
      const delRows=Math.ceil(deliverables.length/2);
      const delH=delRows*4.2+10;
      const cardH=Math.max(47, 8+scopeH+delH);

      stroke(LINEA,.22);
      fill(BLANCO);
      pdf.roundedRect(M,y,CW,cardH,1.6,1.6,'FD');
      titleBar(`Servicio profesional${quoteItems.length>1 ? ' '+(index+1) : ''}`,M,y,CW,GRAFITO_2);

      const tx=M+3.5;
      let ty=y+14.3;

      setFont(6.7,'bold',AZUL_OSCURO);
      put('ALCANCE TÉCNICO',tx,ty);
      ty+=4.6;

      setFont(6.85,'normal',GRAFITO);
      put(scopeLines, tx, ty, {maxWidth:textW});
      ty += scopeLines.length*3.18+5;

      setFont(6.7,'bold',AZUL_OSCURO);
      put('ENTREGABLES',tx,ty);
      ty+=4.3;

      setFont(6.85,'normal',GRAFITO);
      const colW=(textW-9)/2;
      deliverables.forEach((d,idx)=>{
        const col=idx%2,row=Math.floor(idx/2),x=tx+(col*(colW+9)),yy=ty+row*4.2;
        put('•',x,yy);
        put(split(d,colW-5),x+3.7,yy);
      });

      y += cardH + 5;
    }
    function closureBand(){
      const colGap=6;
      const leftW=55;
      const midW=61;
      const totalW=CW-leftW-midW-(colGap*2);
      const x1=M, x2=M+leftW+colGap, x3=x2+midW+colGap;
      const h=47;

      stroke(LINEA,.22);
      fill(BLANCO);
      pdf.roundedRect(x1,y,leftW,h,1.6,1.6,'FD');
      pdf.roundedRect(x2,y,midW,h,1.6,1.6,'FD');
      pdf.roundedRect(x3,y,totalW,h,1.6,1.6,'FD');

      titleBar('Condiciones comerciales',x1,y,leftW,AZUL_OSCURO);
      titleBar('Transferencia',x2,y,midW,GRAFITO_2);

      setFont(6.15,'normal',GRAFITO);
      const cond=q.conditions || '50% de anticipo para iniciar los trabajos. 50% contra entrega de antecedentes finales.';
      put(split(cond,leftW-6),x1+3,y+12);

      let by=y+12;
      const bankLines=[`Nombre: ${COMPANY.holder}`,`RUT: ${COMPANY.rut}`,`${COMPANY.bank} · ${COMPANY.account}`,`Email: ${COMPANY.email}`];
      setFont(5.65,'normal',GRAFITO);
      bankLines.forEach(line=>{
        const lines=split(line,midW-6);
        put(lines,x2+3,by);
        by += lines.length*2.95+1.3;
      });

      const x=x3;
      fill(AZUL_OSCURO);
      pdf.rect(x,y,totalW,7,'F');
      setFont(6.45,'bold',BLANCO);
      put('VALOR DEL SERVICIO',x+3.2,y+4.85);

      let yy=y+13;
      const qty=(quoteItems || []).reduce((s,it)=>s+Number(it?.qty||0),0) || 1;
      const unit=quoteItems.length===1 ? Number(quoteItems[0].price || 0) : q.neto;

      function row(label,val,bold=false,big=false){
        setFont(big?8.3:6.9,bold?'bold':'normal',bold?GRAFITO:GRIS);
        put(label,x+3.2,yy);
        setFont(big?8.3:6.9,bold?'bold':'normal',GRAFITO);
        put(typeof val==='number' ? displayAmount(val) : String(val),x+totalW-3.2,yy,{align:'right'});
        yy += big ? 6.4 : 5.1;
      }

      row('Cantidad',String(qty));
      row('Neto unitario',unit);
      row('Neto',q.neto);
      row('IVA 19%',q.iva);
      stroke(LINEA,.25);
      pdf.line(x+3.2,yy-1.8,x+totalW-3.2,yy-1.8);
      row('TOTAL', Number(q.total || 0), true, true);

      if(q.currency==='UF' && q.ufValue>0){
        setFont(5.5,'normal',GRIS);
        put(`Equiv.: ${displayEq(q.total)}`,x+totalW-3.2,yy-0.2,{align:'right'});
      }

      y += h + 7;
    }
    function signature(){
      setFont(6.9,'normal',GRAFITO); put('Atentamente,',W/2,y,{align:'center'}); y+=11; stroke(GRAFITO,.3); pdf.line(W/2-28,y,W/2+28,y); y+=4.2;
      setFont(7.5,'bold',GRAFITO); put('ROBIN PINTO SERRANO',W/2,y,{align:'center'}); y+=3.8; setFont(6.4,'normal',GRIS); put(`Ingeniero Industrial / Topógrafo · ${COMPANY.name}`,W/2,y,{align:'center'});
    }

    header(); infoBox(); descriptionBlock(); quoteItems.forEach(serviceProposal); closureBand(); signature(); footer();
    const filename = `COT_${quoteCode(q)}.pdf`;
    if(mode === 'share' && navigator.share){ const blob=pdf.output('blob'); const file=new File([blob], filename, {type:'application/pdf'}); await navigator.share({files:[file], title:filename}); }
    else pdf.save(filename);
  }

  async function saveAndSend(){
    const q=currentQuote(); if(!q.client || !q.items.length) return alert('Falta cliente o ítems.'); let f=editingId?window.currentFolio:window.nextFolio;
    if(!editingId){ await fb.runTransaction(fb.db, async(t)=>{ const ref=fb.doc(fb.db,'config','rps_cotizador_v1'); const snap=await t.get(ref); f=snap.exists()?snap.data().lastFolio:1000; t.update(ref,{lastFolio:f+1}); }); }
    const data={...q, folio:f, ref: q.ref || ('AER-' + f)};
    if(editingId) await fb.setDoc(fb.doc(fb.db,'rps_cotizaciones',editingId),data); else await fb.addDoc(fb.collection(fb.db,'rps_cotizaciones'),data);
    await generateAndSharePDF(null,null,'share'); items=[defaultItem()]; editingId=null; document.getElementById('i-name').value=DEFAULT_ITEM_TEXT; document.getElementById('q-service-desc').value=DEFAULT_SERVICE_DESC; renderPreview();
  }


  // --- ZOOM INTERNO ESTABLE PARA PRELIMINAR EN CELULAR ---
  const previewZoom = { scale:1, minScale:1, maxScale:4, x:0, y:0, dragging:false, startX:0, startY:0, startDist:0, startScale:1, pinchX:0, pinchY:0, pinchStartX:0, pinchStartY:0 };
  function zDist(touches){ const dx=touches[0].clientX-touches[1].clientX; const dy=touches[0].clientY-touches[1].clientY; return Math.hypot(dx,dy); }
  function zCenter(touches){ return { x:(touches[0].clientX+touches[1].clientX)/2, y:(touches[0].clientY+touches[1].clientY)/2 }; }
  function applyPreviewZoom(){
    const wrap=document.getElementById('pdf-preview-wrapper');
    if(!wrap) return;
    wrap.style.transform=`translate3d(${previewZoom.x}px, ${previewZoom.y}px, 0) scale(${previewZoom.scale})`;
  }
  function fitPreviewZoom(){
    const box=document.getElementById('preliminar-container');
    const wrap=document.getElementById('pdf-preview-wrapper');
    const page=document.getElementById('pdf-canvas');
    if(!box || !wrap || !page) return;
    const bw=box.clientWidth, bh=box.clientHeight, pw=page.offsetWidth, ph=page.offsetHeight;
    if(!bw || !bh || !pw || !ph){ setTimeout(fitPreviewZoom,120); return; }
    const pad=12;
    const fit=Math.min((bw-pad*2)/pw, (bh-pad*2)/ph);
    const scale=Math.max(0.12, Math.min(1, fit));
    previewZoom.scale=scale;
    previewZoom.minScale=scale;
    previewZoom.maxScale=4;
    previewZoom.x=(bw - pw*scale)/2;
    previewZoom.y=Math.max(8, (bh - ph*scale)/2);
    applyPreviewZoom();
  }
  function setupPreviewZoom(){
    const box=document.getElementById('preliminar-container');
    if(!box || box.dataset.zoomReady==='1') return;
    box.dataset.zoomReady='1';
    box.addEventListener('touchstart', e=>{
      if(e.touches.length===1){ e.preventDefault(); previewZoom.dragging=true; previewZoom.startX=e.touches[0].clientX-previewZoom.x; previewZoom.startY=e.touches[0].clientY-previewZoom.y; }
      if(e.touches.length===2){ e.preventDefault(); previewZoom.dragging=false; previewZoom.startDist=zDist(e.touches); previewZoom.startScale=previewZoom.scale; const c=zCenter(e.touches); previewZoom.pinchX=c.x; previewZoom.pinchY=c.y; previewZoom.pinchStartX=previewZoom.x; previewZoom.pinchStartY=previewZoom.y; }
    }, {passive:false});
    box.addEventListener('touchmove', e=>{
      e.preventDefault();
      if(e.touches.length===1 && previewZoom.dragging){ previewZoom.x=e.touches[0].clientX-previewZoom.startX; previewZoom.y=e.touches[0].clientY-previewZoom.startY; applyPreviewZoom(); }
      if(e.touches.length===2 && previewZoom.startDist>0){
        const current=zDist(e.touches);
        const nextScale=Math.min(previewZoom.maxScale, Math.max(previewZoom.minScale, previewZoom.startScale*(current/previewZoom.startDist)));
        const ratio=nextScale/previewZoom.startScale;
        const c=zCenter(e.touches);
        previewZoom.scale=nextScale;
        previewZoom.x=c.x - (previewZoom.pinchX-previewZoom.pinchStartX)*ratio;
        previewZoom.y=c.y - (previewZoom.pinchY-previewZoom.pinchStartY)*ratio;
        applyPreviewZoom();
      }
    }, {passive:false});
    box.addEventListener('touchend', e=>{ if(e.touches.length===0){ previewZoom.dragging=false; previewZoom.startDist=0; } }, {passive:false});
    box.addEventListener('dblclick', e=>{ e.preventDefault(); if(previewZoom.scale <= previewZoom.minScale+0.03){ previewZoom.scale=Math.min(2,previewZoom.maxScale); previewZoom.x=20; previewZoom.y=20; applyPreviewZoom(); } else fitPreviewZoom(); });
  }
  window.addEventListener('resize', () => setTimeout(fitPreviewZoom, 150));

  window.addEventListener('load',()=>{ if(!document.getElementById('q-service-desc').value) document.getElementById('q-service-desc').value=DEFAULT_SERVICE_DESC; if(!document.getElementById('i-name').value) document.getElementById('i-name').value=DEFAULT_ITEM_TEXT; updateClientsUI(); handleCurrencyChange(); setupPreviewZoom(); renderPreview(); setTimeout(fitPreviewZoom,160); });
</script>
