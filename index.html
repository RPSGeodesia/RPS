<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>RPS Topografía & Geodesia | Cotizador</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #090d16;
      --panel: #111827;
      --panel2: #1f2937;
      --line: #374151;
      --amber: #f59e0b;
      --amber-dark: #b45309;
      --text: #f9fafb;
      --muted: #94a3b8;
      --paper: #ffffff;
      --ink: #0f172a;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(245, 158, 11, 0.08), transparent 35%),
        linear-gradient(145deg, #090d16, #111827 50%, #030712);
    }

    .topnav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      background: rgba(10, 15, 26, 0.95);
      border-bottom: 1px solid rgba(245, 158, 11, 0.25);
      backdrop-filter: blur(12px);
    }

    .topnav button {
      border: 0;
      background: transparent;
      color: rgba(249, 250, 251, 0.5);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 18px 10px;
      font-size: 13px;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .topnav button.active {
      color: var(--amber);
      border-color: var(--amber);
      background: rgba(245, 158, 11, 0.05);
    }

    .tab {
      display: none;
      padding: 18px;
    }

    .tab.active {
      display: block;
    }

    .layout {
      width: min(100%, 1420px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(10, 15, 26, 0.98));
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.5);
    }

    .stack > * + * { margin-top: 16px; }

    .input {
      width: 100%;
      min-width: 0;
      background: #070a12;
      border: 1px solid rgba(245, 158, 11, 0.2);
      color: #fff;
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 16px;
      line-height: 1.4;
      outline: none;
      transition: all 0.25s ease;
    }

    textarea.input {
      min-height: 145px;
      resize: vertical;
      white-space: pre-wrap;
    }

    .input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 17px 20px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #050b14;
      box-shadow: 0 12px 35px rgba(245, 158, 11, 0.25);
      transition: all 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 40px rgba(245, 158, 11, 0.35);
    }

    .btn.green {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      box-shadow: 0 12px 35px rgba(16, 185, 129, 0.25);
    }

    .btn.small {
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 12px;
    }

    .item-row, .list-row {
      background: rgba(10, 15, 26, 0.7);
      border: 1px solid rgba(245, 158, 11, 0.15);
      border-radius: 16px;
      padding: 14px;
    }

    #previewBox {
      width: 100%;
      max-width: 100%;
      height: calc(100vh - 118px);
      min-height: 620px;
      overflow: auto;
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.85), rgba(7, 10, 18, 0.85));
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 26px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      touch-action: pan-x pan-y;
    }

    #pdf-canvas {
      width: auto;
      min-width: 0;
      display: block;
      margin: 0 auto;
    }

    .a4 {
      width: 210mm;
      height: 297mm;
      min-height: 297mm;
      max-height: 297mm;
      background: white;
      color: #1e293b;
      padding: 16mm 14mm;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
      transform-origin: top left;
    }

    .pdf-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      border-bottom: 2px solid #f59e0b;
      padding-bottom: 4mm;
    }

    .brand h1 {
      margin: 0;
      font-size: 14pt;
      font-weight: 800;
      color: #111827;
      tracking: -0.02em;
    }

    .brand p {
      margin: 1mm 0 0;
      font-size: 7.5pt;
      color: #475569;
      line-height: 1.3;
    }

    .quoteBox { text-align: right; }

    .quoteTag {
      display: inline-block;
      background: #111827;
      color: #f59e0b;
      padding: 1.5mm 3mm;
      border-radius: 4px;
      font-size: 7pt;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .quoteNum {
      margin-top: 2mm;
      font-size: 15pt;
      font-weight: 800;
      color: #111827;
    }

    .quoteDate {
      font-size: 7.5pt;
      color: #64748b;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5mm;
      margin-top: 4mm;
    }

    .pdf-card {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      overflow: hidden;
      background: white;
    }

    .bar {
      background: #111827;
      color: #f59e0b;
      font-size: 7pt;
      font-weight: 800;
      text-transform: uppercase;
      padding: 2mm 3mm;
      letter-spacing: 0.5px;
    }

    .bar.blue {
      background: #f59e0b;
      color: #111827;
    }

    .pdf-card-body {
      padding: 3mm;
      font-size: 8pt;
      line-height: 1.35;
      color: #334155;
    }

    .pdf-card-body h3 {
      margin: 0 0 1.5mm;
      font-size: 8.5pt;
      font-weight: 800;
      color: #111827;
    }

    .pdf-card-body p { margin: 0 0 1mm; }

    .desc, .service-body {
      padding: 3mm;
      font-size: 8.5pt;
      line-height: 1.4;
      color: #334155;
    }

    .desc p, .service-body p {
      white-space: pre-wrap;
      margin: 0;
    }

    .service-body h4 {
      margin: 0 0 1.5mm;
      color: #b45309;
      font-size: 8pt;
      font-weight: 800;
      text-transform: uppercase;
    }

    .deliverables {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1mm 4mm;
      font-size: 8pt;
      color: #334155;
    }

    .payment {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 5mm;
      margin-top: 4mm;
    }

    .paymentCols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3mm;
      padding: 1mm;
    }

    .paymentCols h4 {
      margin: 0 0 1.2mm;
      font-size: 7pt;
      color: #b45309;
      font-weight: 800;
      text-transform: uppercase;
    }

    .paymentCols p {
      margin: 0 0 0.8mm;
      font-size: 7.5pt;
      color: #475569;
    }

    .economic {
      border: 1px solid #fde68a;
      border-radius: 6px;
      background: #fffdf5;
      overflow: hidden;
    }

    .econRow {
      display: flex;
      justify-content: space-between;
      padding: 2mm 3mm 0;
      font-size: 8pt;
      color: #475569;
    }

    .econRow strong { color: #111827; }

    .economic hr {
      border: 0;
      border-top: 1px solid #cbd5e1;
      margin: 2mm 3mm 1.5mm;
    }

    .grand strong {
      font-size: 13pt;
      color: #b45309;
      font-weight: 800;
    }

    .signature {
      text-align: center;
      font-size: 7.5pt;
      color: #334155;
      margin-top: 4mm;
    }

    .sigLine {
      width: 45mm;
      margin: 5mm auto 1mm;
      border-top: 1px solid #111827;
    }

    .footer {
      border-top: 1px solid #f59e0b;
      padding-top: 2mm;
      margin-top: auto;
      text-align: center;
      color: #64748b;
      font-size: 6pt;
    }

    .list-row button,
    .item-row button {
      background: #1f2937;
      color: #fde68a;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 7px 9px;
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      #previewBox {
        height: min(72vh, 720px);
        min-height: 430px;
        padding: 12px;
      }
    }

    @media (max-width: 520px) {
      .tab { padding: 12px; }

      .topnav button {
        padding: 14px 6px;
        font-size: 11px;
      }

      .card {
        padding: 16px;
        border-radius: 18px;
      }

      .input {
        font-size: 15px;
        padding: 13px 14px;
      }
    }
  </style>
</head>

<body>
  <nav class="topnav">
    <button id="tab-edit-btn" class="active" onclick="navTo('edit')">Cotizador técnico</button>
    <button id="tab-hist-btn" onclick="navTo('hist')">Historial</button>
    <button id="tab-clients-btn" onclick="navTo('clients')">Clientes</button>
  </nav>

  <section id="tab-edit" class="tab active">
    <div class="layout">
      <div class="stack">
        <div class="card stack">
          <div class="grid grid-cols-2 gap-3">
            <input id="q-date" type="date" class="input" oninput="renderPreview()">
            <input id="q-ref" type="text" class="input" placeholder="AER-1000" oninput="renderPreview()">
          </div>
          <select id="q-currency" class="input" onchange="renderPreview()">
            <option value="CLP">Pesos chilenos (CLP)</option>
            <option value="UF">Unidad de Fomento (UF)</option>
          </select>
          <select id="q-client" class="input" onchange="handleClientSelect()">
            <option value="">Seleccionar cliente</option>
            <option value="NEW">➕ Nuevo cliente</option>
          </select>
          <input id="q-project" class="input" placeholder="Proyecto / referencia del servicio" oninput="renderPreview()">
          <input id="q-location" class="input" placeholder="Ubicación / comuna del proyecto" oninput="renderPreview()">
          <textarea id="q-desc" class="input" oninput="renderPreview()"></textarea>
        </div>

        <div class="card stack">
          <textarea id="i-name" class="input" placeholder="Detalle técnico del servicio"></textarea>
          <div class="grid grid-cols-[80px_1fr] gap-3">
            <input id="i-qty" type="number" class="input text-center" value="1" oninput="updateLivePrice()">
            <input id="i-price" type="number" class="input" placeholder="Precio neto" oninput="updateLivePrice()">
          </div>
          <button class="btn small" onclick="addItem()">Agregar / Actualizar ítem</button>
        </div>

        <div id="items-list" class="stack"></div>

        <div class="card stack">
          <div class="grid grid-cols-2 gap-3">
            <input id="q-validity" class="input" value="15 días" oninput="renderPreview()">
            <input id="q-delivery" class="input" value="Según coordinación" oninput="renderPreview()">
          </div>
          <textarea id="q-conditions" class="input" oninput="renderPreview()">50% de anticipo para iniciar los trabajos. 50% contra entrega de antecedentes finales.</textarea>
          <textarea id="q-notes" class="input" placeholder="Observaciones adicionales" oninput="renderPreview()"></textarea>
        </div>

        <button class="btn green" onclick="saveAndSend()">Guardar y enviar PDF</button>
      </div>

      <div id="previewBox">
        <div id="pdf-canvas"></div>
      </div>
    </div>
  </section>

  <section id="tab-hist" class="tab">
    <div class="max-w-3xl mx-auto stack">
      <input id="search-hist" class="input" placeholder="Buscar cotización..." oninput="renderHistory()">
      <div id="history-list" class="stack"></div>
    </div>
  </section>

  <section id="tab-clients" class="tab">
    <div class="max-w-xl mx-auto stack">
      <div class="card stack">
        <input id="c-id" type="hidden">
        <input id="c-name" class="input" placeholder="Nombre / Empresa">
        <input id="c-rut" class="input" placeholder="RUT">
        <input id="c-phone" class="input" placeholder="Teléfono / WhatsApp">
        <input id="c-email" class="input" placeholder="Email">
        <input id="c-address" class="input" placeholder="Dirección">
        <button class="btn" onclick="saveClient()">Guardar cliente</button>
        <button class="btn small" style="background:#374151;color:white" onclick="clearClientForm()">Cancelar edición</button>
      </div>
      <div id="clients-list" class="stack"></div>
    </div>
  </section>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, setDoc, deleteDoc, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCtlfBJ0QHOMhEDPRAXHL9nRFswnr49rik",
    authDomain: "registro-de-gastos-a21e8.firebaseapp.com",
    projectId: "registro-de-gastos-a21e8",
    storageBucket: "registro-de-gastos-a21e8.firebasestorage.app",
    messagingSenderId: "947355933583",
    appId: "1:947355933583:web:0231b493d8b794cc3b49fa"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.fb = { db, collection, addDoc, setDoc, deleteDoc, doc, runTransaction };
  window.clientes = [];
  window.historial = [];
  window.nextFolio = 1000;

  onSnapshot(doc(db, "config", "rps_cotizador_v1"), snap => {
    window.nextFolio = snap.exists() ? Math.max(1000, Number(snap.data().lastFolio || 1000)) : 1000;
  });

  onSnapshot(collection(db, "rps_clientes"), snap => {
    window.clientes = snap.docs.map(d => ({id: d.id, ...d.data()}));
    if(typeof updateClientsUI === 'function') updateClientsUI();
  });

  onSnapshot(collection(db, "rps_cotizaciones"), snap => {
    window.historial = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b)=>Number(b.folio||0)-Number(a.folio||0));
    if(typeof renderHistory === 'function') renderHistory();
  });
</script>

<script>
  const RPS_LOGO_DATA = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

  const COMPANY = {
    name:'RPS TOPOGRAFÍA & GEODESIA',
    legalName:'ROBIN PINTO SERRANO SERVICIOS DE TOPOGRAFÍA Y GEODESIA E.I.R.L.',
    rut:'77.444.231-6',
    address:'Av. Jaime Guzmán 659 - A3, Isla de Maipo',
    comuna:'Isla de Maipo',
    email:'contacto@rpsgeodesia.com',
    phone:'949207665',
    bank:'Banco Estado',
    account:'Cta Vista Banco Estado N° 36772581224',
    holder:'ROBIN PINTO SERRANO SERVICIOS DE TOPOGRAFÍA Y GEODESIA E.I.R.L.'
  };

  const DEFAULT_SERVICE_DESC = `Junto con saludar, por medio de la presente se cotiza el servicio de levantamiento topográfico georreferenciado para terreno de aproximadamente 5.000 m², ubicado en sector por definir, considerando trabajos de terreno, procesamiento de información técnica y entrega de antecedentes conforme al alcance indicado.`;

  const DEFAULT_ITEM_TEXT = `Levantamiento topográfico georreferenciado de todos los elementos relevantes del terreno mediante sistema GNSS de alta precisión, considerando bordes de calzada, líneas de cierre, líneas de edificación, líneas prediales, postes, cámaras y demás elementos existentes en terreno.\n\nSe considera además postproceso de datos crudos GNSS (GPS) para obtención de coordenadas UTM Datum SIRGAS (WGS84) Huso 19 Sur, vinculadas a punto de control SIRGAS-IGM.\n\nIncluye planificación de vuelo dron, captura aerofotogramétrica and postproceso de información técnica.\n\nEntregables:\n• Plano topográfico\n• Informe técnico\n• Nube de puntos densa\n• Ortomosaico`;

  let items = [defaultItem()];
  let editingId = null;
  let editingClientId = null;
  let editingItemIdx = null;
  let previewZoom = 1;
  let suppressPriceSync = false;

  function defaultItem(){
    return {name:DEFAULT_ITEM_TEXT, qty:1, price:0, total:0, isDefault:true};
  }

  function esc(v){
    return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function amount(n,currency='CLP'){
    return currency==='UF'
      ? Number(n||0).toLocaleString('es-CL',{maximumFractionDigits:2})+' UF'
      : '$ ' + Math.round(Number(n||0)).toLocaleString('es-CL');
  }

  function fmtDate(d){
    if(!d) return '';
    const [y,m,day]=String(d).split('-');
    return `${day}-${m}-${y}`;
  }

  function quoteCode(q){
    return q?.ref || ('AER-' + (q?.folio || window.nextFolio || 1000));
  }

  function normalizeItems(arr){
    return (arr || []).map(it => {
      const qty = Number(it?.qty || 1);
      const price = Number(it?.price || 0);
      return {...it, qty, price, total: Math.round(price * qty * 100) / 100};
    });
  }

  function syncPriceFromEditor(){
    if(suppressPriceSync) return;

    const priceEl = document.getElementById('i-price');
    const qtyEl = document.getElementById('i-qty');
    if(!priceEl || !qtyEl) return;

    const qty = Number(qtyEl.value || 1);
    const price = Number(priceEl.value || 0);

    if(editingItemIdx !== null && editingItemIdx >= 0 && items[editingItemIdx]){
      items[editingItemIdx].qty = qty;
      items[editingItemIdx].price = price;
      items[editingItemIdx].total = Math.round(qty * price * 100) / 100;
      return;
    }

    if(items.length === 1){
      items[0].qty = qty;
      items[0].price = price;
      items[0].total = Math.round(qty * price * 100) / 100;
    }
  }

  function captureFormState() {
    return {
      editingId,
      currentFolio: window.currentFolio,
      items: JSON.parse(JSON.stringify(items)),
      editingItemIdx,
      priceInput: document.getElementById('i-price').value,
      qtyInput: document.getElementById('i-qty').value,
      itemNameInput: document.getElementById('i-name').value,
      date: document.getElementById('q-date').value,
      ref: document.getElementById('q-ref').value,
      currency: document.getElementById('q-currency').value,
      client: document.getElementById('q-client').value,
      project: document.getElementById('q-project').value,
      location: document.getElementById('q-location').value,
      desc: document.getElementById('q-desc').value,
      validity: document.getElementById('q-validity').value,
      delivery: document.getElementById('q-delivery').value,
      conditions: document.getElementById('q-conditions').value,
      notes: document.getElementById('q-notes').value
    };
  }

  function restoreFormState(state) {
    editingId = state.editingId;
    window.currentFolio = state.currentFolio;
    items = state.items;
    editingItemIdx = state.editingItemIdx;

    document.getElementById('q-date').value = state.date;
    document.getElementById('q-ref').value = state.ref;
    document.getElementById('q-currency').value = state.currency;
    document.getElementById('q-client').value = state.client;
    document.getElementById('q-project').value = state.project;
    document.getElementById('q-location').value = state.location;
    document.getElementById('q-desc').value = state.desc;
    document.getElementById('q-validity').value = state.validity;
    document.getElementById('q-delivery').value = state.delivery;
    document.getElementById('q-conditions').value = state.conditions;
    document.getElementById('q-notes').value = state.notes;

    document.getElementById('i-price').value = state.priceInput;
    document.getElementById('i-qty').value = state.qtyInput;
    document.getElementById('i-name').value = state.itemNameInput;
  }

  function applyQuoteToForm(h, triggerRender = true) {
    if(!h) return;

    suppressPriceSync = true;

    editingId = h.id || null;
    window.currentFolio = Number(h.folio || 1000);
    items = normalizeItems((h.items && h.items.length) ? h.items : [defaultItem()]);

    document.getElementById('q-date').value = h.date || '';
    document.getElementById('q-ref').value = h.ref || ('AER-' + (h.folio || 1000));
    document.getElementById('q-currency').value = h.currency || 'CLP';
    document.getElementById('q-client').value = h.client || '';
    document.getElementById('q-project').value = h.project || '';
    document.getElementById('q-location').value = h.location || '';
    document.getElementById('q-desc').value = h.serviceDesc || DEFAULT_SERVICE_DESC;
    document.getElementById('q-validity').value = h.validity || '15 días';
    document.getElementById('q-delivery').value = h.delivery || 'Según coordinación';
    document.getElementById('q-conditions').value = h.conditions || '';
    document.getElementById('q-notes').value = h.notes || '';

    editingItemIdx = null;
    document.getElementById('i-name').value = items[0]?.name || DEFAULT_ITEM_TEXT;
    document.getElementById('i-qty').value = items[0]?.qty || 1;
    document.getElementById('i-price').value = Number(items[0]?.price || 0) ? items[0].price : '';

    suppressPriceSync = false;

    if (triggerRender) renderPreview();
  }

  function currentQuote(){
    syncPriceFromEditor();
    items = normalizeItems(items);

    const normalized = items;
    const neto = normalized.reduce((s,i)=>s+Number(i.total||0),0);
    const iva = Math.round(neto*.19);

  function parseService(txt){
    const raw = String(txt||'').trim();
    const parts = raw.split(/Entregables\s*:/i);
    const scope = (parts[0] || raw).trim();

    let deliverables = [];
    if(parts[1]) {
      deliverables = parts[1].split(/\n|•|-/).map(x=>x.trim()).filter(Boolean);
    }

    if(!deliverables.length) {
      deliverables = ['Plano topográfico','Informe técnico','Nube de puntos densa','Ortomosaico'];
    }

    return {scope, deliverables};
  }

  function fitPreviewToScreen(force=false) {
    const box = document.getElementById('previewBox');
    const canvas = document.getElementById('pdf-canvas');
    const page = canvas ? canvas.querySelector('.a4') : null;

    if(!box || !canvas || !page) return;
    if(!force && box.dataset.userZoom === '1') return;

    page.style.transform = 'scale(1)';
    page.style.transformOrigin = 'top left';

    const available = Math.max(260, box.clientWidth - 24);
    const naturalW = page.offsetWidth || 794;
    const naturalH = page.offsetHeight || 1123;

    previewZoom = Math.min(1, Math.max(0.32, available / naturalW));

    page.style.transform = `scale(${previewZoom})`;
    canvas.style.width = `${naturalW * previewZoom}px`;
    canvas.style.height = `${naturalH * previewZoom}px`;
  }

  function setupPreviewTouchZoom() {
    const box = document.getElementById('previewBox');
    const canvas = document.getElementById('pdf-canvas');

    if (!box || !canvas) return;

    let startDist = 0;
    let startZoom = 1;

    function dist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    box.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        const page = canvas.querySelector('.a4');
        if(!page) return;
        box.dataset.userZoom = '1';
        startDist = dist(e.touches);
        startZoom = previewZoom;
      }
    }, { passive: false });

    box.addEventListener('touchmove', e => {
      if (e.touches.length === 2) {
        e.preventDefault();

        const page = canvas.querySelector('.a4');
        if(!page) return;

        const newDist = dist(e.touches);
        previewZoom = Math.min(2.4, Math.max(0.32, startZoom * (newDist / startDist)));

        page.style.transformOrigin = 'top left';
        page.style.transform = `scale(${previewZoom})`;
        canvas.style.width = `${page.offsetWidth * previewZoom}px`;
        canvas.style.height = `${page.offsetHeight * previewZoom}px`;
      }
    }, { passive: false });
  }

  async function generateAndSharePDF(historyId=null, quoteOverride=null){
    const JsPDF = window.jspdf?.jsPDF;
    if(!JsPDF) return alert('No se cargó jsPDF.');

    let originalState = null;

    try {
      if(quoteOverride){
        originalState = captureFormState();
        applyQuoteToForm(quoteOverride, false);
        await new Promise(r=>setTimeout(r,50));
      } else if(historyId){
        const h = quoteById(historyId);
        if(!h) return alert('No se encontró la cotización.');

        originalState = captureFormState();
        applyQuoteToForm(h, false);
        await new Promise(r=>setTimeout(r,50));
      }

      const q = quoteOverride || (historyId ? quoteById(historyId) : currentQuote());
      const c = selectedClient();

      const pdf = new JsPDF({orientation:'portrait', unit:'mm', format:'a4', compress:true});
      const W=210, H=297, ML=14, MR=14, MT=16, MB=16, CW=W-ML-MR;
      const G=[30,41,59], B=[245,158,11], S=[100,116,139], L=[203,213,225];
      let pdfY=MT;

      function pdfFont(size, style='normal', color=G){
        pdf.setFont('helvetica', style);
        pdf.setFontSize(size);
        pdf.setTextColor(...color);
      }

      function pdfLines(text, w){
        return pdf.splitTextToSize(String(text ?? ''), w);
      }

      function pdfFoot(){
        pdf.setDrawColor(...B);
        pdf.setLineWidth(.3);
        pdf.line(ML,H-9,W-MR,H-9);
        pdfFont(6,'normal',S);
        pdf.text(`${COMPANY.name} · ${COMPANY.address} · ${COMPANY.comuna} · ${COMPANY.email} · Fono: ${COMPANY.phone}`, W/2, H-5, {align:'center', maxWidth:CW});
      }

      function pdfHead(){
        pdfY = MT;

        pdfFont(14,'bold',[22,30,46]);
        pdf.text(COMPANY.name,ML,pdfY+5);

        pdfFont(7.5,'normal',S);
        pdf.text('Servicios topográficos y geodésicos',ML,pdfY+10);
        pdf.text(`${COMPANY.email} · Fono: ${COMPANY.phone}`,ML,pdfY+14);

        pdf.setFillColor(22,30,46);
        pdf.roundedRect(W-MR-48,pdfY,48,10,1,1,'F');

        pdfFont(7,'bold',[245,158,11]);
        pdf.text('COTIZACIÓN TÉCNICA',W-MR-24,pdfY+6.5,{align:'center'});

        pdfFont(15,'bold',[22,30,46]);
        pdf.text(`N° ${quoteCode(q)}`,W-MR,pdfY+21,{align:'right'});

        pdfFont(7.5,'normal',S);
        pdf.text(`Fecha: ${fmtDate(q.date)}`,W-MR,pdfY+26,{align:'right'});

        pdfY+=32;
        pdf.setDrawColor(...B);
        pdf.setLineWidth(.6);
        pdf.line(ML,pdfY,W-MR,pdfY);
        pdfY+=6;
      }

      function newPage(){
        pdfFoot();
        pdf.addPage();
        pdfHead();
      }

      function ensureSpace(mm){
        if(pdfY + mm > H - MB - 8) newPage();
      }

      function sectionTitle(title, amber=false){
        ensureSpace(12);

        if(amber){
          pdf.setFillColor(...B);
          pdfFont(6.5,'bold',[22,30,46]);
        } else {
          pdf.setFillColor(22,30,46);
          pdfFont(6.5,'bold',[245,158,11]);
        }

        pdf.roundedRect(ML,pdfY,CW,6,1,1,'F');
        pdf.text(title,ML+3,pdfY+4.2);
        pdfY+=8;
      }

      function pdfPara(text, size=8.5, lh=4.2, x=ML+3, w=CW-6){
        const arr = pdfLines(text,w);

        for(const ln of arr){
          ensureSpace(lh + 2);
          pdfFont(size,'normal',G);
          pdf.text(ln,x,pdfY);
          pdfY+=lh;
        }

        pdfY+=2;
      }

      pdfHead();

      const hBox=34, leftW=88, gapBox=6, rx=ML+leftW+gapBox, rw=CW-leftW-gapBox;

      ensureSpace(hBox+8);

      pdf.setDrawColor(...L);
      pdf.setFillColor(255,255,255);
      pdf.roundedRect(ML,pdfY,leftW,hBox,1,1,'FD');
      pdf.roundedRect(rx,pdfY,rw,hBox,1,1,'FD');

      pdf.setFillColor(22,30,46);
      pdf.roundedRect(ML,pdfY,leftW,6,1,1,'F');

      pdf.setFillColor(...B);
      pdf.roundedRect(rx,pdfY,rw,6,1,1,'F');

      pdfFont(6.5,'bold',[245,158,11]);
      pdf.text('EN ATENCIÓN A',ML+3,pdfY+4.2);

      pdfFont(6.5,'bold',[22,30,46]);
      pdf.text('ANTECEDENTES DEL PROYECTO',rx+3,pdfY+4.2);

      pdfFont(8,'bold',[22,30,46]);
      pdf.text(pdfLines((c.name||'---').toUpperCase(),leftW-6),ML+3,pdfY+12);

      pdfFont(7.5,'normal',G);
      pdf.text(`RUT: ${c.rut||'—'}`,ML+3,pdfY+19);
      pdf.text(pdfLines(`Dirección: ${c.address||'—'}`,leftW-6),ML+3,pdfY+24);
      pdf.text(`Contacto: ${c.phone||c.email||'—'}`,ML+3,pdfY+30);

      let yy=pdfY+12;

      function rowPDF(label,val){
        pdfFont(7,'bold',S);
        pdf.text(label,rx+3,yy);

        pdfFont(7.5,'normal',G);
        pdf.text(pdfLines(val||'—',rw-24),rx+24,yy);
        yy+=4.5;
      }

      rowPDF('Proyecto:',q.project||'Servicio técnico');
      rowPDF('Ubicación:',q.location||'Por definir');
      rowPDF('Validez:',q.validity||'15 días');
      rowPDF('Entrega:',q.delivery||'Según coordinación');
      rowPDF('Moneda:',q.currency==='UF'?'UF':'Pesos chilenos (CLP)');

      pdfY+=hBox+6;

      sectionTitle('DESCRIPCIÓN DEL SERVICIO', true);
      pdfPara(q.serviceDesc||DEFAULT_SERVICE_DESC,8.5,4.2);

      const quoteItems = q.items.length ? q.items : [defaultItem()];
      const parsed = parseService(quoteItems[0].name);

      sectionTitle('SERVICIO PROFESIONAL');

      pdfFont(7.5,'bold',[180,83,9]);
      pdf.text('ALCANCE TÉCNICO',ML+3,pdfY);
      pdfY+=4.5;

      pdfPara(parsed.scope,8.5,4.2);

      sectionTitle('SERVICIO PROFESIONAL · ENTREGABLES');

      for(const d of parsed.deliverables){
        ensureSpace(5);
        pdfFont(8,'normal',G);
        pdf.text(`• ${d}`,ML+5,pdfY);
        pdfY+=4;
      }

      pdfY+=4;

      const hPay=42, totalW=68, infoW=CW-totalW-gapBox;

      ensureSpace(hPay+8);

      const top=pdfY;
      const txBox=ML+infoW+gapBox;

      pdf.setDrawColor(...L);
      pdf.setFillColor(255,255,255);
      pdf.roundedRect(ML,top,infoW,hPay,1,1,'FD');
      pdf.roundedRect(txBox,top,totalW,hPay,1,1,'FD');

      pdf.setFillColor(240,253,244);
      pdf.roundedRect(ML,top,infoW,6,1,1,'F');

      pdfFont(6.5,'bold',[22,30,46]);
      pdf.text('CONDICIONES Y DATOS DE PAGO',ML+3,top+4.2);

      const colW=(infoW-8)/2;
      const x2=ML+4+colW+2;

      pdfFont(7,'bold',[180,83,9]);
      pdf.text('Condiciones comerciales',ML+3,top+13);

      pdfFont(7.5,'normal',G);
      pdf.text(pdfLines(q.conditions||'',colW),ML+3,top+18);

      pdfFont(7,'bold',[180,83,9]);
      pdf.text('Transferencia bancaria',x2,top+13);

      pdfFont(7,'normal',G);
      pdf.text(pdfLines(`${COMPANY.holder}\nRUT: ${COMPANY.rut}\n${COMPANY.bank}\n${COMPANY.account}\n${COMPANY.email}`,colW),x2,top+18);

      pdf.setFillColor(22,30,46);
      pdf.roundedRect(txBox,top,totalW,6,1,1,'F');

      pdfFont(6.5,'bold',[245,158,11]);
      pdf.text('RESUMEN ECONÓMICO',txBox+3,top+4.2);

      let yyy=top+14;

      function rE(label,val,total=false){
        pdfFont(total?8:7.2,total?'bold':'normal',total?[180,83,9]:S);
        pdf.text(label,txBox+3,yyy);

        pdfFont(total?11:8,total?'bold':'normal',total?[180,83,9]:G);
        pdf.text(amount(val,q.currency),txBox+totalW-3,yyy,{align:'right'});
        yyy+=total?7:5.5;
      }

      rE('Valor neto',q.neto);
      rE('IVA 19%',q.iva);

      pdf.setDrawColor(...L);
      pdf.line(txBox+3,yyy-2,txBox+totalW-3,yyy-2);

      rE('TOTAL SERVICIO',q.total,true);

      pdfY=top+hPay+8;

      ensureSpace(24);

      pdfFont(7.5,'normal',G);
      pdf.text('Atentamente,',W/2,pdfY,{align:'center'});
      pdfY+=6;

      pdf.setDrawColor(22,30,46);
      pdf.line(W/2-25,pdfY,W/2+25,pdfY);
      pdfY+=4;

      pdfFont(8,'bold',G);
      pdf.text('ROBIN PINTO SERRANO',W/2,pdfY,{align:'center'});

      pdfFont(6.5,'normal',S);
      pdf.text(`Ingeniero Industrial / Topógrafo · ${COMPANY.name}`,W/2,pdfY+4,{align:'center'});

      pdfFoot();

      pdf.save(`COT_${quoteCode(q)}.pdf`);

    } catch(e) {
      console.error(e);
      alert('No se pudo generar el PDF. Revisa la consola para más detalle.');
    }

    if(originalState){
      restoreFormState(originalState);
      renderPreview();
    }
  }

  window.downloadHist = (id) => {
    generateAndSharePDF(id, null);
  };

  function initApp(){
    document.getElementById('q-date').valueAsDate = new Date();
    document.getElementById('q-ref').value = 'AER-1000';
    document.getElementById('q-desc').value = DEFAULT_SERVICE_DESC;
    document.getElementById('i-name').value = DEFAULT_ITEM_TEXT;
    document.getElementById('i-qty').value = 1;
    document.getElementById('i-price').value = '';

    updateClientsUI();
    renderPreview();
    setupPreviewTouchZoom();

    window.addEventListener('resize', () => fitPreviewToScreen(true));
    window.addEventListener('orientationchange', () => setTimeout(() => fitPreviewToScreen(true), 250));
  }

  window.onload = initApp;
</script>
</body>
</html>
